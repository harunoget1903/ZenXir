  /* ---------- Splash ---------- */
  #splash {
    position:absolute; inset:0; z-index:40;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:#050508; transition: opacity 0.65s ease;
  }
  #splash.gone { opacity:0; pointer-events:none; }
  .splash-aura {
    position:absolute; width:440px; height:440px; border-radius:50%;
    background: radial-gradient(circle, rgba(125,240,192,0.14), rgba(143,216,255,0.06) 45%, transparent 72%);
    opacity:0; animation: auraIn 2s ease-out 0.3s forwards, auraBreathe 5s ease-in-out 2.3s infinite;
    filter: blur(4px);
  }
  @keyframes auraIn { from { opacity:0; transform:scale(0.6); } to { opacity:1; transform:scale(1); } }
  @keyframes auraBreathe { 0%,100% { transform:scale(1); opacity:0.7; } 50% { transform:scale(1.12); opacity:1; } }
  .splash-logo {
    width:104px; height:104px; margin-bottom:26px;
    opacity:0; transform:scale(0.7) translateY(6px);
    animation: logoIn 1s cubic-bezier(0.22,1,0.36,1) 0.1s forwards, logoGlow 3.6s ease-in-out 1.2s infinite;
    border-radius:24px;
  }
  .splash-logo img { width:100%; height:100%; object-fit:cover; border-radius:24px; display:block; }
  @keyframes logoIn { 0% { opacity:0; transform:scale(0.7) translateY(6px); filter:blur(6px); } 100% { opacity:1; transform:scale(1) translateY(0); filter:blur(0); } }
  @keyframes logoGlow {
    0%,100% { filter:drop-shadow(0 0 16px rgba(125,240,192,0.25)); }
    50% { filter:drop-shadow(0 0 34px rgba(125,240,192,0.5)); }
  }
  .splash-title { margin-top:2px; }
  .splash-title .sl, .splash-title .zx-x-badge {
    opacity:0;
  }
  .splash-title .sl {
    display:inline-block; font-size:38px; font-weight:200; letter-spacing:0.38em; color:var(--ink);
    animation: letterIn 0.7s cubic-bezier(0.22,1,0.36,1) forwards;
  }
  .splash-title .zx-x-badge {
    animation: letterIn 0.7s cubic-bezier(0.22,1,0.36,1) forwards, xbreathe 4.5s ease-in-out 2.6s infinite;
  }
  @keyframes letterIn { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:none; } }
  #splashSub {
    margin-top:38px; font-size:10px; letter-spacing:0.32em; color:var(--dim);
    opacity:0; animation: fadeP 2.6s ease-in-out 2.7s infinite;
  }
  @keyframes fadeP { 0%,100% { opacity:0.2; } 50% { opacity:0.7; } }

  /* ---------- HUD ---------- */
  #hud {
    position:absolute; top:0; left:0; right:0;
    display:flex; align-items:center; gap:5px;
    padding: max(10px, env(safe-area-inset-top)) 8px 0 8px;
    pointer-events:none; z-index:5;
  }
  #hud > * { pointer-events:auto; }
  .chip {
    display:flex; flex-direction:column; align-items:center; gap:1px;
    padding:4px 8px; border:1px solid var(--line); border-radius:12px;
    background:rgba(255,255,255,0.028);
    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
    white-space:nowrap;
  }
  .chip .lbl { font-size:7.5px; letter-spacing:0.18em; color:rgba(255,255,255,0.34); text-transform:lowercase; }
  .chip .val { font-size:12px; letter-spacing:0.04em; display:flex; align-items:center; gap:3px; color:var(--ink); }
  #chipTarget canvas { width:14px; height:14px; display:block; }
  #chipScore .val { color:#fff; min-width:34px; justify-content:center; }
  #chipCoins .val { color:#FFD59E; }
  #chipCoins { border-color:rgba(255,213,158,0.22); }
  #chipBest .val { color:rgba(255,255,255,0.75); }
  #chipBest.crowned { border-color:rgba(255,216,107,0.5); }
  #chipBest.crowned .val { color:#FFD86B; text-shadow:0 0 12px rgba(255,216,107,0.55); }
  .spacer { flex:1; }
  .iconbtn {
    width:30px; height:30px; flex:none; display:flex; align-items:center; justify-content:center;
    border:1px solid var(--line); border-radius:50%;
    background:rgba(255,255,255,0.028); color:var(--dim); font-size:13px; cursor:pointer;
  }
  .iconbtn:active { background:rgba(255,255,255,0.09); }

  /* ---------- Joker ---------- */
  #jokerBtn {
    position:absolute; left:10px; bottom:max(14px, env(safe-area-inset-bottom)); z-index:6;
    padding:9px 13px; border:1px solid rgba(179,157,255,0.35); border-radius:999px;
    background:rgba(179,157,255,0.06); color:var(--lav);
    font-size:11.5px; letter-spacing:0.08em; cursor:pointer;
  }
  #jokerBtn small { opacity:0.7; font-size:10px; }
  #jokerBtn.off { opacity:0.38; }
  #jokerBtn.ready { border-color:rgba(125,240,192,0.55); color:var(--mint); background:rgba(125,240,192,0.07); animation:breathe 3s ease-in-out infinite; }

  /* ---------- Hedef tanıtımı ---------- */
  #targetIntro {
    position:absolute; left:50%; top:42%; z-index:9;
    display:flex; flex-direction:column; align-items:center; gap:4px;
    pointer-events:none; opacity:0;
    transform:translate(-50%,-50%);
  }
  #targetIntro.show { animation: tiIn 0.55s cubic-bezier(0.34,1.56,0.64,1) forwards; }
  #targetIntro.fly { animation: tiFly 0.6s cubic-bezier(0.5,0,0.85,0.4) forwards; }
  #tiCanvas { width:120px; height:120px; }
  #tiText { font-size:20px; font-weight:200; letter-spacing:0.22em; color:#fff; }
  #tiSub { font-size:10px; letter-spacing:0.3em; color:var(--dim); }
  @keyframes tiIn { from { opacity:0; transform:translate(-50%,-50%) scale(0.55); } to { opacity:1; transform:translate(-50%,-50%) scale(1); } }
  @keyframes tiFly { from { opacity:1; transform:translate(-50%,-50%) scale(1); } to { opacity:0; transform:translate(calc(-50% - 110px), calc(-50% - 300px)) scale(0.15); } }

  /* ---------- Menü ---------- */
  #menuOverlay {
    position:absolute; inset:0; z-index:10;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:13px;
    background:
      radial-gradient(ellipse 90% 55% at 50% 25%, rgba(var(--th-a1),0.13), transparent 65%),
      radial-gradient(ellipse 80% 50% at 50% 85%, rgba(var(--th-a2),0.13), transparent 65%),
      rgb(var(--th-base));
    transition: background 0.6s ease;
  }
  #menuOverlay h1 {
    font-size:40px; font-weight:200; letter-spacing:0.42em; margin-left:0.42em;
    color:var(--ink); animation: breathe 6s ease-in-out infinite;
  }
  #menuOverlay .sub {
    font-size:11px; letter-spacing:0.32em; color:var(--dim);
    margin:-2px 0 30px 0.32em; animation: breathe 6s ease-in-out infinite;
  }
  @keyframes breathe { 0%,100% { transform:scale(1); opacity:0.88; } 50% { transform:scale(1.045); opacity:1; } }
  #menuLogo {
    width:64px; height:64px; border-radius:16px; margin-bottom:2px;
    filter: drop-shadow(0 0 16px rgba(125,240,192,0.28));
    animation: breathe 6s ease-in-out infinite;
  }
  .mainbtn {
    width:232px; padding:14px 18px; font-size:14px; letter-spacing:0.06em;
    color:var(--ink); text-align:left;
    border:1px solid var(--line); border-radius:16px;
    background:rgba(255,255,255,0.03); cursor:pointer;
    transition: border-color 0.3s, transform 0.15s;
  }
  .mainbtn small { color:var(--dim); font-size:11px; letter-spacing:0.04em; }
  .mainbtn:active { transform:scale(0.97); }
  #mLevelBtn { border-color:rgba(125,240,192,0.4); box-shadow:0 0 22px rgba(125,240,192,0.09) inset, 0 0 18px rgba(125,240,192,0.06); }
  #mZenBtn.locked { color:var(--dim); }
  #howBtn { background:none; border:none; color:var(--dim); font-size:11px; letter-spacing:0.14em; cursor:pointer; margin-top:8px; padding:8px; }
  #langBtn {
    position:absolute; top:max(14px, env(safe-area-inset-top)); right:14px;
    width:46px; height:30px; border-radius:999px;
    border:1px solid var(--line); background:rgba(255,255,255,0.03);
    color:var(--dim); font-size:11px; letter-spacing:0.14em; cursor:pointer;
  }
  .menufoot { position:absolute; bottom:max(20px, env(safe-area-inset-bottom)); font-size:10px; letter-spacing:0.22em; color:rgba(255,255,255,0.25); }

  /* ---------- Eğitim ---------- */
  #tutOverlay {
    position:absolute; inset:0; z-index:30;
    display:flex; align-items:center; justify-content:center; background:#050508;
  }
  .tutcard { width:min(82%, 300px); text-align:center; }
  .tutcard.slidein { animation: tslide 0.45s cubic-bezier(0.22,1,0.36,1); }
  @keyframes tslide { from { opacity:0; transform:translateX(28px); } to { opacity:1; transform:none; } }
  #tutGlyph { font-size:62px; color:var(--mint); text-shadow:0 0 28px rgba(125,240,192,0.5); animation:breathe 4s ease-in-out infinite; margin-bottom:24px; }
  #tutText { font-size:13.5px; line-height:1.8; letter-spacing:0.05em; color:var(--ink); min-height:76px; }
  #tutText b { color:var(--mint); font-weight:500; }
  #tutDots { display:flex; gap:8px; justify-content:center; margin:24px 0; }
  #tutDots span { width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,0.16); transition:background 0.3s, transform 0.3s; }
  #tutDots span.on { background:var(--mint); transform:scale(1.35); }
  .tutbtns { display:flex; flex-direction:column; gap:4px; align-items:center; }
  #tutNext { text-align:center; width:190px; }
  #tutSkip { background:none; border:none; color:var(--dim); font-size:11px; letter-spacing:0.2em; cursor:pointer; padding:10px; }

  /* ---------- Dünyalar (bölüm seçimi) ---------- */
  #worldsOverlay {
    position:absolute; inset:0; z-index:12;
    display:flex; flex-direction:column;
    background: rgb(var(--th-base));
    transition: background 0.6s ease;
  }
  #worldScroll {
    flex:1; overflow-y:auto; touch-action:pan-y; overscroll-behavior:contain;
    padding:4px 14px 34px; scrollbar-width:none;
  }
  #worldScroll::-webkit-scrollbar { display:none; }
  #worldList { display:flex; flex-direction:column; gap:11px; }
  .worldcard {
    position:relative; padding:16px 16px 14px;
    border:1px solid var(--line); border-radius:18px;
    cursor:pointer; overflow:hidden;
    animation: wcIn 0.5s cubic-bezier(0.22,1,0.36,1) both;
    transition: transform 0.15s, border-color 0.3s;
  }
  .worldcard:nth-child(1){animation-delay:.02s} .worldcard:nth-child(2){animation-delay:.06s}
  .worldcard:nth-child(3){animation-delay:.10s} .worldcard:nth-child(4){animation-delay:.14s}
  .worldcard:nth-child(5){animation-delay:.18s} .worldcard:nth-child(6){animation-delay:.22s}
  .worldcard:nth-child(7){animation-delay:.26s} .worldcard:nth-child(8){animation-delay:.30s}
  .worldcard:nth-child(9){animation-delay:.34s} .worldcard:nth-child(10){animation-delay:.38s}
  @keyframes wcIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:none; } }
  .worldcard:not(.locked) { border-color:color-mix(in srgb, var(--acc) 40%, transparent); }
  .worldcard:not(.locked):active { transform:scale(0.985); }
  .worldcard.locked { opacity:0.42; cursor:default; filter:grayscale(0.5); }
  .wnum {
    position:absolute; top:12px; right:16px;
    font-size:30px; font-weight:200; color:var(--acc); opacity:0.32;
  }
  .wname { font-size:15px; letter-spacing:0.1em; color:#fff; margin-bottom:3px; }
  .wsub { font-size:10.5px; letter-spacing:0.14em; color:var(--dim); }
  .wbar {
    margin-top:11px; height:3px; border-radius:999px;
    background:rgba(255,255,255,0.09); overflow:hidden;
  }
  .wfill {
    height:100%; border-radius:999px; background:var(--acc);
    box-shadow:0 0 8px var(--acc);
    transition: width 0.5s ease;
  }

  /* ---------- Yolculuk haritası ---------- */
  #mapOverlay {
    position:absolute; inset:0; z-index:12;
    display:flex; flex-direction:column; background:rgb(var(--th-base)); overflow:hidden;
    transition: background 0.6s ease;
  }
  .mapglow { position:absolute; width:75%; padding-top:75%; border-radius:50%; filter:blur(46px); opacity:0.55; pointer-events:none; animation:breathe 9s ease-in-out infinite; }
  .mapglow.a { top:-12%; left:-18%; background:radial-gradient(circle, rgba(var(--th-a1),0.16), transparent 70%); }
  .mapglow.b { bottom:-12%; right:-18%; background:radial-gradient(circle, rgba(var(--th-a2),0.16), transparent 70%); animation-delay:4.5s; }
  .maphead {
    position:relative; z-index:1;
    display:flex; align-items:center; gap:12px;
    padding:max(12px, env(safe-area-inset-top)) 12px 10px;
    font-size:12px; letter-spacing:0.32em; color:var(--dim);
  }
  .maphead .mapcoins { margin-left:auto; letter-spacing:0.05em; color:#FFD59E; font-size:11.5px; }
  #mapScroll {
    position:relative; z-index:1; flex:1;
    overflow-y:auto; touch-action:pan-y; overscroll-behavior:contain; scrollbar-width:none;
  }
  #mapScroll::-webkit-scrollbar { display:none; }
  #mapSvg { position:absolute; top:0; left:0; }
  #mapSvg polyline.flow { animation: dashflow 26s linear infinite; }
  @keyframes dashflow { to { stroke-dashoffset:-260; } }
  #mapNodes { position:relative; }
  .mapnode {
    position:absolute; width:42px; height:42px; border-radius:50%;
    display:flex; align-items:center; justify-content:center; font-size:12.5px;
    border:1px solid var(--line); color:var(--dim);
    background:rgba(9,10,14,0.9); cursor:pointer;
    opacity:var(--o,1);
    transform:translate(-50%,-50%);
    animation: nodeIn 0.55s cubic-bezier(0.34,1.3,0.64,1) both;
  }
  @keyframes nodeIn {
    from { transform:translate(-50%,-36%) scale(0.5); opacity:0; }
    to   { transform:translate(-50%,-50%) scale(1); opacity:var(--o,1); }
  }
  .mapnode.done {
    border-color:rgba(var(--th-a1),0.5); color:rgb(var(--th-a1));
    background:rgba(14,22,19,0.92);
    animation: nodeIn 0.55s cubic-bezier(0.34,1.3,0.64,1) both, nodeBreathe 5s ease-in-out infinite;
  }
  @keyframes nodeBreathe {
    0%,100% { box-shadow:0 0 0 rgba(var(--th-a1),0); }
    50% { box-shadow:0 0 12px rgba(var(--th-a1),0.22); }
  }
  .mapnode.cur {
    border-color:rgb(var(--th-a1)); color:#fff;
    box-shadow:0 0 24px rgba(var(--th-a1),0.4);
    animation: nodeIn 0.55s cubic-bezier(0.34,1.3,0.64,1) both, curPulse 2.2s ease-in-out infinite;
  }
  @keyframes curPulse {
    0%,100% { box-shadow:0 0 16px rgba(var(--th-a1),0.3); }
    50% { box-shadow:0 0 30px rgba(var(--th-a1),0.55); }
  }
  .mapnode.cur::after {
    content:''; position:absolute; inset:-1px; border-radius:50%;
    border:1px solid rgba(var(--th-a1),0.85);
    animation: nring 2.6s ease-out infinite;
  }
  .mapnode.cur::before {
    content:''; position:absolute; inset:-1px; border-radius:50%;
    border:1px solid rgba(var(--th-a1),0.5);
    animation: nring 2.6s ease-out 1.3s infinite;
  }
  @keyframes nring { from { transform:scale(1); opacity:0.8; } to { transform:scale(2.15); opacity:0; } }
  .mapnode.lock { --o:0.32; cursor:default; }

  /* ---------- Mağaza ---------- */
  #shopOverlay {
    position:absolute; inset:0; z-index:12;
    display:flex; flex-direction:column;
    background: radial-gradient(ellipse 90% 40% at 50% 0%, rgba(var(--th-a3),0.14), transparent 70%), rgb(var(--th-base));
    transition: background 0.6s ease;
  }
  #shopScroll { flex:1; overflow-y:auto; touch-action:pan-y; overscroll-behavior:contain; padding:2px 14px 34px; scrollbar-width:none; }
  #shopScroll::-webkit-scrollbar { display:none; }
  .shopsec { font-size:10px; letter-spacing:0.3em; color:var(--dim); margin:18px 2px 8px; text-transform:lowercase; }
  .shopcard { border:1px solid var(--line); border-radius:16px; background:rgba(255,255,255,0.02); padding:12px; margin-bottom:10px; }
  .adcard { display:flex; justify-content:center; }
  .palprev { width:150px; height:30px; display:block; margin:0 auto 10px; }
  .bgprev { height:46px; border-radius:10px; margin-bottom:10px; border:1px solid rgba(255,255,255,0.06); }
  .shoprow { display:flex; align-items:center; gap:8px; }
  .shopname { font-size:13px; letter-spacing:0.08em; }
  .shopbtns { margin-left:auto; display:flex; gap:6px; align-items:center; flex-wrap:wrap; justify-content:flex-end; }
  .shopbtn {
    padding:7px 11px; border-radius:999px; border:1px solid var(--line);
    background:rgba(255,255,255,0.035); color:var(--ink);
    font-size:11px; letter-spacing:0.05em; cursor:pointer;
  }
  .shopbtn:active { transform:scale(0.96); }
  .shopbtn.gold { border-color:rgba(255,213,158,0.45); color:#FFD59E; }
  .shopbtn.off { opacity:0.4; }
  .shopbtn.buy { border-color:rgba(125,240,192,0.4); color:var(--mint); }
  .shopbtn.primarybtn.wide {
    width:100%; padding:12px; border-radius:13px;
    border:1px solid rgba(125,240,192,0.45); background:rgba(125,240,192,0.05);
    color:var(--mint); font-size:13px;
  }
  .shoptag { font-size:10px; letter-spacing:0.15em; color:var(--mint); border:1px solid rgba(125,240,192,0.4); border-radius:999px; padding:6px 11px; }
  .packrow { display:flex; gap:8px; margin-bottom:10px; }
  .packcard { flex:1; border:1px solid var(--line); border-radius:14px; background:rgba(255,255,255,0.02); padding:12px 6px; display:flex; flex-direction:column; align-items:center; gap:9px; }
  .packcoins { font-size:14px; color:#FFD59E; letter-spacing:0.05em; }

  /* ---------- Nefes rehberi (sürpriz) ---------- */
  #breathGuide {
    position:absolute; left:50%; top:40%; z-index:4;
    width:1px; height:1px; pointer-events:none;
    opacity:0; transition:opacity 1.4s ease;
  }
  #breathGuide.go { opacity:1; }
  #breathGuide.hidden { display:none; }
  .breathring {
    position:absolute; left:0; top:0; width:64px; height:64px; margin:-32px 0 0 -32px;
    border-radius:50%; border:1px solid rgba(125,240,192,0.32);
    animation: breathcycle 8s ease-in-out infinite;
  }
  .breathring.r2 { border-color:rgba(143,216,255,0.22); animation-delay:0.3s; }
  @keyframes breathcycle {
    0%   { transform:scale(0.72); opacity:0.15; }
    40%  { transform:scale(1.55); opacity:0.55; }
    50%  { transform:scale(1.55); opacity:0.55; }
    90%  { transform:scale(0.72); opacity:0.15; }
    100% { transform:scale(0.72); opacity:0.15; }
  }
  .breathtxt {
    position:absolute; left:50%; top:100px; transform:translateX(-50%);
    width:200px; text-align:center;
    font-size:10px; letter-spacing:0.3em; color:rgba(255,255,255,0.32);
    animation: breathtxtfade 8s ease-in-out infinite;
  }
  @keyframes breathtxtfade { 0%,100% { opacity:0.2; } 45%,55% { opacity:0.75; } }

  /* ---------- Modal ---------- */
  #modal {
    position:absolute; inset:0; z-index:20;
    display:flex; align-items:center; justify-content:center;
    background:rgba(3,4,6,0.62);
    backdrop-filter:blur(7px); -webkit-backdrop-filter:blur(7px);
  }
  #modal::before {
    content:''; position:absolute; left:50%; top:44%;
    width:60px; height:60px; border-radius:50%;
    border:2px solid rgba(var(--th-a1),0.7);
    transform:translate(-50%,-50%);
    animation: modalBloom 1.1s cubic-bezier(0.22,1,0.36,1) forwards;
    pointer-events:none;
  }
  #modal::after {
    content:''; position:absolute; left:50%; top:44%;
    width:60px; height:60px; border-radius:50%;
    border:1.5px solid rgba(var(--th-a2),0.55);
    transform:translate(-50%,-50%);
    animation: modalBloom 1.3s cubic-bezier(0.22,1,0.36,1) 0.15s forwards;
    pointer-events:none;
  }
  @keyframes modalBloom {
    from { transform:translate(-50%,-50%) scale(0.4); opacity:1; }
    to   { transform:translate(-50%,-50%) scale(11); opacity:0; }
  }
  .card {
    width:min(80%, 292px); padding:26px 22px 18px; text-align:center;
    border:1px solid var(--line); border-radius:22px; background:rgba(10,12,17,0.94);
    animation: cardPop 0.55s cubic-bezier(0.34,1.45,0.64,1) both;
  }
  @keyframes cardPop {
    0% { opacity:0; transform:scale(0.82) translateY(14px); }
    100% { opacity:1; transform:scale(1) translateY(0); }
  }
  .card h2 {
    animation: titleGlow 2.6s ease-in-out 0.4s infinite;
  }
  @keyframes titleGlow {
    0%,100% { text-shadow:0 0 0 rgba(var(--th-a1),0); }
    50% { text-shadow:0 0 16px rgba(var(--th-a1),0.65); }
  }
    animation: cardIn 0.45s cubic-bezier(0.22,1,0.36,1);
  }
  @keyframes cardIn { from { transform:scale(0.92) translateY(10px); opacity:0; } to { transform:none; opacity:1; } }
  .card h2 { font-size:15px; font-weight:300; letter-spacing:0.3em; color:var(--mint); margin-bottom:12px; text-transform:lowercase; }
  .mbody p { font-size:12.5px; color:var(--dim); letter-spacing:0.05em; margin:5px 0; }
  .mbody .big { font-size:36px; font-weight:200; color:#fff; letter-spacing:0.04em; margin:10px 0; }
  .coinbreak { margin:2px 0 8px; }
  .coinbreak p { font-size:11.5px; color:rgba(255,255,255,0.4); margin:2px 0; }
  .mbody .glowline { color:var(--lav); text-shadow:0 0 14px rgba(179,157,255,0.5); font-size:13px; margin-top:10px; }
  .mbody b { color:var(--ink); }
  .mbody small { font-size:10px; }
  .mbtns { margin-top:18px; display:flex; flex-direction:column; gap:8px; }
  .mbtn {
    padding:12px; font-size:13px; letter-spacing:0.05em; color:var(--ink);
    border:1px solid var(--line); border-radius:13px; background:rgba(255,255,255,0.035);
    cursor:pointer; transition:transform 0.12s;
  }
  .mbtn small { color:var(--dim); }
  .mbtn:active { transform:scale(0.97); }
  .mbtn.primary { border-color:rgba(125,240,192,0.45); color:var(--mint); box-shadow:0 0 16px rgba(125,240,192,0.08) inset; }
  .mbtn:disabled { opacity:0.32; pointer-events:none; }

  /* ---------- Efekt katmanı ---------- */
  #fx { position:absolute; inset:0; pointer-events:none; z-index:22; overflow:hidden; }
  .floatxt {
    position:absolute; transform:translate(-50%,-50%);
    font-size:13px; font-weight:300; letter-spacing:0.28em;
    color:var(--mint); text-shadow:0 0 12px rgba(125,240,192,0.6);
    animation: floatUp 1.4s ease-out forwards;
  }
  .floatxt.bigpraise {
    font-size:24px; font-weight:200; letter-spacing:0.4em;
    color:#fff; text-shadow:0 0 18px rgba(var(--th-wash),0.9), 0 0 40px rgba(var(--th-wash),0.5);
    animation: praiseIn 1.9s cubic-bezier(0.22,1,0.36,1) forwards;
  }
  @keyframes praiseIn {
    0% { opacity:0; transform:translate(-50%,-50%) scale(0.6); filter:blur(4px); }
    18% { opacity:1; transform:translate(-50%,-50%) scale(1.06); filter:blur(0); }
    30% { transform:translate(-50%,-50%) scale(1); }
    75% { opacity:1; }
    100% { opacity:0; transform:translate(-50%,-62%) scale(1.02); }
  }
  @keyframes floatUp {
    0% { opacity:0; transform:translate(-50%,-50%) scale(0.8); }
    18% { opacity:1; }
    100% { opacity:0; transform:translate(-50%,-140%) scale(1.05); }
  }
  .toast {
    position:absolute; left:50%; bottom:15%;
    transform:translateX(-50%) translateY(8px);
    padding:9px 18px; font-size:11.5px; letter-spacing:0.12em; color:var(--ink);
    border:1px solid var(--line); border-radius:999px; background:rgba(12,14,20,0.94);
    opacity:0; transition:opacity 0.4s, transform 0.4s; white-space:nowrap;
  }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  @media (prefers-reduced-motion: reduce) {
    .zx-x-badge, #menuOverlay h1, #menuOverlay .sub, #tutGlyph, .mapglow { animation:none !important; }
  }
</style>
</head>
<body>
  <div id="wrap">
    <canvas id="game"></canvas>

    <div id="hud" class="hidden">
      <button class="iconbtn" id="btnPause" aria-label="Duraklat">☰</button>
      <div class="chip"><span class="lbl" id="lvlLbl">bölüm</span><span class="val" id="lvlVal">1</span></div>
      <div class="chip" id="chipTarget"><span class="lbl" id="tgtLbl">hedef</span><span class="val"><canvas id="tIcon"></canvas><span id="tCount">8</span></span></div>
      <div class="chip" id="chipBest"><span class="lbl" id="bestLbl">rekor</span><span class="val" id="bestVal">♛ 0</span></div>
      <div class="spacer"></div>
      <div class="chip" id="chipShots"><span class="lbl" id="shotLbl">atış</span><span class="val" id="shotsVal">10</span></div>
      <div class="chip" id="chipScore"><span class="lbl" id="scoreLbl">skor</span><span class="val" id="scoreVal">0</span></div>
      <div class="chip" id="chipCoins"><span class="lbl" id="goldLbl">altın</span><span class="val" id="coinsVal">⬡ 0</span></div>
      <button class="iconbtn" id="btnMute" aria-label="Ses">♪</button>
    </div>

    <button id="jokerBtn" class="hidden">◈ joker <small>50⬡</small></button>

    <div id="targetIntro" class="hidden">
      <canvas id="tiCanvas"></canvas>
      <div id="tiText"></div>
      <div id="tiSub"></div>
    </div>

/* Tema önceliği: deneme (trial) > dünya kimliği (bölüm oynarken) > satın alınan tema.
   Mağaza kozmetikleri Zen modu ve menülerde geçerlidir; her dünya kendi kimliğiyle gelir. */
function applyThemes() {
  const wt = (G.themeWorld != null) ? WORLD_THEMES[G.themeWorld] : null;
  let cols = null, bg = null;
  if (G.trial && G.trial.kind === 'pal') cols = (SHOP.palettes[G.trial.id] || {}).colors;
  if (G.trial && G.trial.kind === 'bg')  bg = SHOP.backgrounds[G.trial.id];
  if (!cols) cols = wt ? wt.palette : ((SHOP.palettes[G.activePal] || {}).colors || BASE_COLORS);
  if (!bg)   bg = wt ? wt.bg : (SHOP.backgrounds[G.activeBg] || SHOP.backgrounds.night);

  CUR_ACCENT = wt ? WORLDS[G.themeWorld].accent : '#7DF0C0';
  if (typeof Sfx !== 'undefined' && Sfx.setTone) Sfx.setTone(wt ? wt.tone : 1);
  if (typeof initDust === 'function') initDust();
  // ekrandaki HER katman (menü/harita/mağaza dahil) tema değişimini anında yansıtsın
  try {
    const root = document.documentElement.style;
    root.setProperty('--th-base', CUR_BASE || '9,11,20');

    if (bg.aurora && bg.aurora[2]) root.setProperty('--th-a3', bg.aurora[2].c);
  } catch (e) {}
}

/* ---------- Ses Motoru — daha da sakin (v3) ---------- */
const Sfx = (() => {
  let ac = null, master = null, ambGain = null, delaySend = null, muted = false, started = false;
  let toneMul = 1;               // dünya tonu (kök nota transpozesi)
  const droneNodes = [];         // dron osilatörleri (ton geçişi için saklanır)
  const PENTA = [220, 261.63, 293.66, 329.63, 392, 440, 523.25];

  function ensure() {
    if (ac) return true;
    try {
      ac = new (window.AudioContext || window.webkitAudioContext)();
      master = ac.createGain(); master.gain.value = muted ? 0 : 0.9;
      master.connect(ac.destination);
      // rüyamsı yankı hattı
      delaySend = ac.createGain(); delaySend.gain.value = 1;
      const dly = ac.createDelay(1.5); dly.delayTime.value = 0.52;
      const fb = ac.createGain(); fb.gain.value = 0.36;
      const df = ac.createBiquadFilter(); df.type = 'lowpass'; df.frequency.value = 900;
      delaySend.connect(dly); dly.connect(df); df.connect(fb); fb.connect(dly);
      const wet = ac.createGain(); wet.gain.value = 0.58;
      df.connect(wet); wet.connect(master);
      return true;
    } catch (e) { return false; }
  }

  function noiseBuffer(sec) {
    const b = ac.createBuffer(1, ac.sampleRate * sec, ac.sampleRate);
    const d = b.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
    return b;
  }

  function startAmbient() {
    if (started || !ensure()) return;
    started = true;
    ambGain = ac.createGain(); ambGain.gain.value = 0.0;
    ambGain.connect(master);
    ambGain.gain.linearRampToValueAtTime(1.0, ac.currentTime + 5);
    // tüm atmosferin çok yavaş nefes alması
    const breath = ac.createOscillator(); breath.frequency.value = 1 / 12;
    const breathG = ac.createGain(); breathG.gain.value = 0.10;
    breath.connect(breathG); breathG.connect(ambGain.gain); breath.start();

    // rüzgar — uzak ve yumuşak
    const wind = ac.createBufferSource();
    wind.buffer = noiseBuffer(4); wind.loop = true;
    const lp = ac.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 200; lp.Q.value = 0.28;
    const wg = ac.createGain(); wg.gain.value = 0.0095;
    wind.connect(lp); lp.connect(wg); wg.connect(ambGain);
    const lfo = ac.createOscillator(); lfo.frequency.value = 0.035;
    const lfoG = ac.createGain(); lfoG.gain.value = 100;
    lfo.connect(lfoG); lfoG.connect(lp.frequency);
    wind.start(); lfo.start();

    // derin dron + cam parıltısı
    [[55, 0.006], [110, 0.008], [110.7, 0.008], [220.4, 0.003]].forEach(([f, v]) => {
      const o = ac.createOscillator(); o.type = 'sine'; o.frequency.value = f * toneMul;
      const g = ac.createGain(); g.gain.value = v;
      o.connect(g); g.connect(ambGain); o.start();
      droneNodes.push({ o, f });
    });

    // uzun, kadifemsi pad dalgaları — ~20 sn'de bir iki notalık akor süzülür
    (function padLoop() {
      if (!ac) return;
      setTimeout(() => {
        if (ac && !muted) {
          const root = pickArr([110, 130.81, 146.83, 164.81]) * toneMul;
          padSwell(root); padSwell(root * 1.5);
          if (Math.random() < 0.6) setTimeout(() => padSwell(root * 1.189), 2200); // yumuşak 3'lü — sıcak akor
        }
        padLoop();
      }, rnd(13000, 24000));
    })();

    // seyrek, uzaklarda süzülen piyano
    (function pianoLoop() {
      if (!ac) return;
      setTimeout(() => {
        if (ac && !muted) softNote(pickArr(PENTA) * toneMul / 2, 0.026, 5.4);
        pianoLoop();
      }, rnd(9000, 17000));
    })();
  }

  /* dünya tonu: kök notayı transpoze eder — dronlar yumuşakça kayar, yeni notalar yeni tonda doğar */
  function setTone(mul) {
    toneMul = mul || 1;
    if (!ac || !droneNodes.length) return;
    const t = ac.currentTime;
    droneNodes.forEach(({ o, f }) => {
      try {
        o.frequency.cancelScheduledValues(t);
        o.frequency.setValueAtTime(o.frequency.value, t);
        o.frequency.linearRampToValueAtTime(f * toneMul, t + 2.5);
      } catch (e) {}
    });
  }

  /* uzun atak/uzun bırakışlı pad — okyanus dalgası gibi kabarıp iner */
  function padSwell(freq) {
    const t = ac.currentTime;
    const o = ac.createOscillator(); o.type = 'sine'; o.frequency.value = freq;
    const g = ac.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.linearRampToValueAtTime(0.016, t + 4.5);
    g.gain.linearRampToValueAtTime(0.0001, t + 11);
    o.connect(g); g.connect(ambGain || master);
    o.start(t); o.stop(t + 11.5);
  }

  function softNote(freq, vol, dur) {
    if (!ensure()) return;
    const t = ac.currentTime;
    const o = ac.createOscillator(); o.type = 'triangle'; o.frequency.value = freq;
    const f = ac.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 850;
    const g = ac.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(vol, t + 0.1);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(f); f.connect(g); g.connect(ambGain || master);
    if (delaySend) { const s = ac.createGain(); s.gain.value = 0.6; g.connect(s); s.connect(delaySend); }
    o.start(t); o.stop(t + dur + 0.1);
  }

  function drop(depth) {
    if (!ensure() || muted) return;
    const t = ac.currentTime;
    const base = PENTA[Math.min(depth, PENTA.length - 1)] * toneMul;
    const o = ac.createOscillator(); o.type = 'sine';
    o.frequency.setValueAtTime(base * 2.2, t);
    o.frequency.exponentialRampToValueAtTime(base * 0.8, t + 0.24);
    const g = ac.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.19, t + 0.016);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.38);
    const f = ac.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 1150;
    o.connect(f); f.connect(g); g.connect(master);
    if (delaySend) { const s = ac.createGain(); s.gain.value = 0.3; g.connect(s); s.connect(delaySend); }
    o.start(t); o.stop(t + 0.45);

    const n = ac.createBufferSource(); n.buffer = noiseBuffer(0.12);
    const bf = ac.createBiquadFilter(); bf.type = 'bandpass'; bf.frequency.value = 420; bf.Q.value = 1.2;
    const ng = ac.createGain();
    ng.gain.setValueAtTime(0.055, t);
    ng.gain.exponentialRampToValueAtTime(0.0001, t + 0.12);
    n.connect(bf); bf.connect(ng); ng.connect(master);
    n.start(t);
  }

  function whoosh() {
    if (!ensure() || muted) return;
    const t = ac.currentTime;
    const n = ac.createBufferSource(); n.buffer = noiseBuffer(0.25);
    const f = ac.createBiquadFilter(); f.type = 'lowpass';
    f.frequency.setValueAtTime(1800, t);
    f.frequency.exponentialRampToValueAtTime(260, t + 0.22);
    const g = ac.createGain();
    g.gain.setValueAtTime(0.04, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.24);
    n.connect(f); f.connect(g); g.connect(master);
    n.start(t);
  }

  /* bölüm tamamlama çanı — pop sesinden bilinçli olarak farklı: yükselen, parlak, ferahlatıcı */
  function levelUp() {
    if (!ensure() || muted) return;
    const t = ac.currentTime;
    const notes = [523.25, 659.25, 783.99, 1046.5]; // C5 E5 G5 C6 — parlak majör arpej
    notes.forEach((f, i) => {
      const start = t + i * 0.09;
      const o = ac.createOscillator(); o.type = 'sine'; o.frequency.value = f;
      const o2 = ac.createOscillator(); o2.type = 'triangle'; o2.frequency.value = f * 2;
      const g = ac.createGain();
      g.gain.setValueAtTime(0.0001, start);
      g.gain.exponentialRampToValueAtTime(0.16, start + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, start + 1.1);
      const g2 = ac.createGain(); g2.gain.value = 0.045;
      o.connect(g); o2.connect(g2); g2.connect(g); g.connect(master);
      if (delaySend) { const s = ac.createGain(); s.gain.value = 0.5; g.connect(s); s.connect(delaySend); }
      o.start(start); o.stop(start + 1.2);
      o2.start(start); o2.stop(start + 1.2);
    });
  }

  function click() { softNote(660, 0.022, 0.3); }

  function toggleMute() {
    muted = !muted;
    if (master) master.gain.value = muted ? 0 : 0.9;
    return muted;
  }

  return { start: () => { ensure(); startAmbient(); }, drop, whoosh, click, softNote, levelUp, setTone, toggleMute, isMuted: () => muted };
})();
