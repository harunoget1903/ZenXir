const key = (r, c) => r + ',' + c;
const maxColFor = r => COLS - 1 - (mod(r, 2) ? 1 : 0);
function cellPos(r, c) {
  return {
    x: R + c * 2 * R + (mod(r, 2) ? R : 0),
    y: TOP + R + r * ROWH + G.scrollY
  };
}
function neighborKeys(r, c) {
  const odd = mod(r, 2) === 1;
  const list = odd
    ? [[r, c - 1], [r, c + 1], [r - 1, c], [r - 1, c + 1], [r + 1, c], [r + 1, c + 1]]
    : [[r, c - 1], [r, c + 1], [r - 1, c - 1], [r - 1, c], [r + 1, c - 1], [r + 1, c]];
  return list.map(([rr, cc]) => key(rr, cc));
}

/* ---------- Seviye Üretimi: 1000 bölüm, 10 dünya ----------
   - Makro: erken hızlı tırmanış, sonra sürekli artış.
   - Dinamik atış: hedefe orantılı, dar marj (orta zorluk).
   - Dünya-içi ritim: yuvarlak bölümler sıkı, aralarda nefes molası.
   - Özel objeler: erken başlar, yoğunlaşır — asıl zorluk bunlar. */
function makeLevel(n) {
  n = clamp(n, 1, MAX_LEVEL);
  const t = (n - 1) / (MAX_LEVEL - 1);
  const macro = Math.pow(t, 0.55);
  const inWorld = ((n - 1) % LEVELS_PER_WORLD) / (LEVELS_PER_WORLD - 1);
  const wave = 0.06 * Math.sin(inWorld * Math.PI * 3);
  const d = clamp(macro + wave, 0, 1);
  const w = worldOf(n);
  const localT = inWorld;

  const rows = Math.round(lerp(5, 9, d));
  const colorCount = clamp(3 + Math.round(d * 3), 3, PALETTE.length); // 3 → 6 renk
  const goal = Math.round(lerp(8, 30, d)); // hedef yükseltildi

  // DİNAMİK ATIŞ: hedefe orantılı, dar marj
  const effPerShot = lerp(1.25, 1.6, d);   // beklenen verim (grup + zincir + joker)
  const marginPct = lerp(0.26, 0.07, d);   // güvenlik marjı sıkılaştırıldı (~+1 atış)
  let shots = Math.round((goal / effPerShot) * (1 + marginPct));
  if (n % 10 === 0) shots -= 1;            // yuvarlak bölümler sıkı
  else if (n % 7 === 0) shots += 1;        // ara ara nefes molası
  shots = Math.max(6, shots);

  const density = lerp(0.80, 0.96, d);

  // ÖZEL OBJELER: 1. dünyadan itibaren, ama dünya-1 içinde kademeli tanıtılır
  // (ilk birkaç bölüm temiz kalsın, sonra sırayla buz → taş → zincir belirir)
  const g = n - 1; // 0-tabanlı bölüm sırası
  const iceGate   = g >= 3;   // ~4. bölümden itibaren buz
  const stoneGate = g >= 8;   // ~9. bölümden itibaren taş
  const chainGate = g >= 14;  // ~15. bölümden itibaren zincir
  const ramp = clamp(localT * 1.8, 0.3, 1);
  const ice   = iceGate   ? lerp(0.05, 0.24, clamp(w / 7, 0, 1)) * ramp : 0;
  const stone = stoneGate ? lerp(0.04, 0.16, clamp(w / 6, 0, 1)) * ramp : 0;
  const chain = chainGate ? lerp(0.04, 0.20, clamp(w / 5, 0, 1)) * ramp : 0;

  return { rows, colorCount, goal, shots, density, ice, stone, chain };
}

function fillGrid(rows, colorCount, density, L) {
  G.grid.clear();
  const t0 = performance.now();
  const ice = (L && L.ice) || 0, stone = (L && L.stone) || 0, chain = (L && L.chain) || 0;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c <= maxColFor(r); c++) {
      if (Math.random() > density) continue;
      const born = t0 + 300 + r * 75 + c * 18;
      const roll = Math.random();
      // taş: renksiz kalıcı engel (üst satırlarda daha olası, tavanı tıkar)
      if (roll < stone && r < rows - 1) {
        G.grid.set(key(r, c), { r, c, idx: -1, type: 'stone', born });
        continue;
      }
      const idx = (Math.random() * colorCount) | 0;
      const cell = { r, c, idx, born };
      const roll2 = Math.random();
      if (roll2 < ice) { cell.type = 'ice'; cell.hp = 2; }        // buzlu: 2 vuruş
      else if (roll2 < ice + chain) { cell.type = 'chain'; }      // zincirli: sadece zincirleme kırar
      G.grid.set(key(r, c), cell);
    }
  }
}

function startLevel(n) {
  if (n > MAX_LEVEL) { UI.journeyDone(); return; }
  const L = makeLevel(n);
  // KÖK ÇÖZÜM: tahta, cihazın oynanabilir alanına sığmalı.
  // Kısa ekranlarda (uygulama içi önizleme vb.) 9 satır bariyerin altına sarkıyor
  // ve top yapışacak yer bulamıyordu — satır sayısını ekrana göre sınırla.
  const maxRows = Math.max(4, Math.floor((H - 258 - TOP - R - BALL_R) / ROWH));
  if (L.rows > maxRows) {
    const ratio = maxRows / L.rows;
    L.rows = maxRows;
    // daha az satır = daha az obje; hedef ve atışları orantıla ki denge bozulmasın
    L.goal = Math.max(6, Math.round(L.goal * (0.75 + 0.25 * ratio)));
    L.shots = Math.max(6, Math.round(L.shots * (0.78 + 0.22 * ratio)));
  }
  G.mode = 'level'; G.state = 'playing';
  G.themeWorld = worldOf(n); applyThemes(); // dünya kimliği: palet + arka plan + müzik
  G.level = n; G.shots = L.shots;
  G.score = 0; G.dispScore = 0; G.combo = 0; G.levelCoins = 0;
  G.scrollY = 0; G.scrollTarget = 0; G.topRow = 0;
  G.fly = null; G.pops = []; G.ripples = []; G.pendingPops = 0;
  G.resolveLock = false; G.curRainbow = false;
  fillGrid(L.rows, L.colorCount, L.density, L);
  G.targetIdx = (Math.random() * L.colorCount) | 0;
  G.targetGoal = L.goal; G.targetLeft = L.goal;
  // sadece DOĞRUDAN temizlenebilir (normal, taş/buz/zincir olmayan) hedef hücreleri say
  let count = 0;
  for (const b of G.grid.values()) if (b.idx === G.targetIdx && !b.type) count++;
  // takviye: normal & hedef-olmayan hücreleri hedef rengine çevir (taşa asla dokunma)
  const others = [...G.grid.values()].filter(b => b.idx !== G.targetIdx && !b.type);
  while (count < L.goal + 2 && others.length) {
    const i = (Math.random() * others.length) | 0;
    others.splice(i, 1)[0].idx = G.targetIdx;
    count++;
  }
  refillQueue(true);
  UI.enterGame();
  UI.targetIntro();  // hedef sembol küçük bir törenle sahneye gelir
  // İlk 5 bölüm: sıkmadan, bölüm başına tek eğitim ipucu (bir kez gösterilir)
  const hints = (LANGS[LANG] || LANGS.tr).lvlHints || [];
  const hintsSeen = store.get('zx_hints_seen', []);
  if (n <= hints.length && !hintsSeen.includes(n)) {
    hintsSeen.push(n); store.set('zx_hints_seen', hintsSeen);
    setTimeout(() => { if (G.state === 'playing') UI.toast(hints[n - 1]); }, 2400);
  } else if (!G.swapUsed) {
    // ⇄ değiştirmeyi hâlâ keşfetmemişse hatırlat (öğrenince kendiliğinden susar)
    setTimeout(() => { if (!G.swapUsed && G.state === 'playing') UI.toast(T('swapHint')); }, 2600);
  }
  // yeni mekanik ilk kez sahnede mi? bir kez tanıt
  const seen = store.get('zx_seen_mech', {});
  let has = { ice: false, stone: false, chain: false };
  for (const b of G.grid.values()) { if (b.type && has[b.type] === false) has[b.type] = true; }
  const announce = [];
  if (has.ice && !seen.ice) { seen.ice = true; announce.push('newIce'); }
  if (has.stone && !seen.stone) { seen.stone = true; announce.push('newStone'); }
  if (has.chain && !seen.chain) { seen.chain = true; announce.push('newChain'); }
  if (announce.length) {
    store.set('zx_seen_mech', seen);
    announce.forEach((k, i) => setTimeout(() => { if (G.state === 'playing') UI.toast(T(k)); }, 3400 + i * 2600));
  }
}

function startZen() {
  G.mode = 'zen'; G.state = 'playing';
  G.themeWorld = null;
  G.trial = null; applyThemes();
  G.score = 0; G.dispScore = 0; G.combo = 0;
  G.scrollY = 0; G.scrollTarget = 0; G.topRow = 0;
  G.fly = null; G.pops = []; G.ripples = []; G.pendingPops = 0;
  G.zenShots = 0; G.zenRowPending = false; G.resolveLock = false;
  G.zenContinueUsed = false; G.zenStartBest = G.best;
  G.zenStartTime = performance.now(); G.breathNextAt = G.zenStartTime + 42000;
  G.curRainbow = false;
  fillGrid(5, PALETTE.length, 0.9);
  refillQueue(true);
  UI.enterGame();
}

function presentColors() {
  const s = new Set();
  for (const b of G.grid.values()) if (b.idx >= 0 && b.type !== 'stone') s.add(b.idx);
  if (G.mode === 'level' && G.targetLeft > 0 && s.has(G.targetIdx)) s.add(G.targetIdx);
  return s.size ? [...s] : PALETTE.map((_, i) => i);
}

/* Akıllı top üretimi (Anti-Frustration RNG):
   - Bitişe çok az kaldıysa (son 1-2 hedef) hedef renk %65 ihtimalle gelir.
   - Aksi halde, üretilen top "avoid" ile (kuyrukta yanında duracak top) %85
     ihtimalle FARKLI renkte olur — üst üste aynı rengin gelme sıkıntısını azaltır. */
/* Akıllı top üretimi (Anti-Frustration RNG):
   - SERT KURAL: aynı renk asla üst üste 2'den fazla gelemez (seri kesici).
   - Hedef renge ağırlık verilir ama bu ağırlık seri kesiciyi ASLA aşamaz.
   - Bunun dışında yeni top, yanındakinden %85 ihtimalle farklı olur. */
function pickColor(avoid) {
  let opts = presentColors();
  if (!opts.length) return 0;

  // 1) Seri kesici — son iki top aynı renkse, o renk kesinlikle havuzdan çıkar
  if (G.lastColors && G.lastColors.length >= 2 &&
      G.lastColors[0] === G.lastColors[1] && opts.length > 1) {
    const noStreak = opts.filter(i => i !== G.lastColors[0]);
    if (noStreak.length) opts = noStreak;
  }

  let choice = null;

  // 2) Hedef rengi ağırlığı — ama sadece seri kesiciden geçen havuz içinde
  if (G.mode === 'level' && opts.includes(G.targetIdx)) {
    const nearEnd = G.targetLeft > 0 && G.targetLeft <= 2;
    const boost = nearEnd ? 0.55 : 0.22; // düşürüldü: efektif oran zaten bunun çok üstüne çıkıyordu
    if (Math.random() < boost) choice = G.targetIdx;
  }

  // 3) Tekrar önleyici — yanındakiyle aynı olmasın (hedef seçimi de buna tabi)
  if (choice == null) {
    let pool = opts;
    if (avoid != null && opts.length > 1 && Math.random() < 0.85) {
      const filtered = opts.filter(i => i !== avoid);
      if (filtered.length) pool = filtered;
    }
    choice = pickArr(pool);
  }

  // geçmişi güncelle (en yeni başta)
  if (!G.lastColors) G.lastColors = [];
  G.lastColors.unshift(choice);
  if (G.lastColors.length > 3) G.lastColors.pop();
  return choice;
}

function refillQueue(reset) {
  if (reset) { G.lastColors = []; G.cur = pickColor(null); G.next = pickColor(G.cur); }
  else { G.cur = G.next; G.next = pickColor(G.cur); }
}

/* ---------- Yerleşme ---------- */
function findSnapCell(x, y) {
  const minRow = G.topRow;
  const rGuess = Math.round((y - G.scrollY - TOP - R) / ROWH);
  let best = null, bd = Infinity;
  for (let r = Math.max(minRow, rGuess - 2); r <= rGuess + 2; r++) {
    for (let c = 0; c <= maxColFor(r); c++) {
      if (G.grid.has(key(r, c))) continue;
      const p = cellPos(r, c);
      if (p.y > LAUNCH.y - BALL_R * 3) continue; // bariyer fırlatıcıya göreli — ekrandan bağımsız
      if (r !== minRow) {
        let touch = false;
        for (const nk of neighborKeys(r, c)) if (G.grid.has(nk)) { touch = true; break; }
        if (!touch) continue;
      }
      const d = (p.x - x) ** 2 + (p.y - y) ** 2;
      if (d < bd) { bd = d; best = { r, c }; }
    }
  }
  return best;
}

/* ---------- Ripple + Zincirleme ---------- */
function spawnRipple(x, y, color, big) {
  G.ripples.push({ x, y, color, t0: performance.now(), dur: big ? 1200 : 750, maxR: big ? W * 0.9 : BALL_R * 4.2 });
}

/* Her sembolün kendine has patlama karakteri:
   yıldız→parıltı kıvılcımları, daire→su damlacıkları, altıgen→kristal kıymıklar,
   üçgen→açılı konfeti, elmas→ışık parıltıları, kare→cam kırıkları */
function spawnBurst(idx, x, y) {
  const shape = PALETTE[idx].shape, color = PALETTE[idx].c, now = performance.now();
  const specs = {
    star:     { n: 9,  shape: 'star',     speed: [70, 150], size: [2, 4.5], life: [500, 780], grav: 8,   spin: true,  fade: 'twinkle' },
    circle:   { n: 6,  shape: 'circle',   speed: [40, 95],  size: [1.6, 3.4], life: [520, 820], grav: 90,  spin: false, fade: 'drip' },
    hex:      { n: 7,  shape: 'hex',      speed: [55, 120], size: [2, 3.8], life: [480, 720], grav: 20,  spin: true,  fade: 'shard' },
    triangle: { n: 8,  shape: 'triangle', speed: [60, 135], size: [2, 3.6], life: [460, 700], grav: 30,  spin: true,  fade: 'shard' },
    diamond:  { n: 6,  shape: 'diamond',  speed: [0, 0],    size: [1, 1],  life: [280, 420], grav: 0,   spin: false, fade: 'glint' },
    square:   { n: 8,  shape: 'square',   speed: [50, 125], size: [1.8, 3.4], life: [480, 740], grav: 40,  spin: true,  fade: 'shard' },
  };
  const s = specs[shape] || specs.circle;
  if (s.fade === 'glint') {
    // elmas: kısa ömürlü ışık ışınları
    for (let i = 0; i < s.n; i++) {
      const a = (i / s.n) * TAU + rnd(-0.2, 0.2);
      G.bursts.push({ kind: 'glint', x, y, a, len: rnd(14, 26), color, t0: now, life: rnd(s.life[0], s.life[1]) });
    }
    return;
  }
  for (let i = 0; i < s.n; i++) {
    const a = rnd(0, TAU), sp = rnd(s.speed[0], s.speed[1]);
    G.bursts.push({
      kind: 'p', shape: s.shape, color,
      x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
      grav: s.grav, rot: rnd(0, TAU), vr: s.spin ? rnd(-6, 6) : 0,
      size: rnd(s.size[0], s.size[1]), t0: now, life: rnd(s.life[0], s.life[1]),
      fade: s.fade,
    });
  }
}

/* ---------- Combo Kutlaması ----------
   Büyük an = büyük his. Kademeli: sarsıntı → flash → övgü → renk dalgası.
   Grup büyüklüğü de sayılır: 6+ objelik tek patlama da kutlanır. */
function comboFx(combo, pos, groupSize) {
  const now = performance.now();
  const big = Math.max(combo, groupSize >= 8 ? 4 : groupSize >= 6 ? 3 : 1);
  if (big >= 2) { G.shake = Math.min(3 + big * 1.6, 12); G.shakeT0 = now; }
  if (big >= 3) {
    spawnRipple(pos.x, pos.y, CUR_ACCENT, true);
    G.flash = Math.min(0.10 + big * 0.03, 0.22); G.flashT0 = now;
  }
  if (big >= 4) {
    G.hueWave = now + 1200; // ~1.2 sn boyunca tüm semboller renk dalgasında yüzer
    const words = (LANGS[LANG] || LANGS.tr).praise;
    UI.floatText({ x: W / 2, y: H * 0.34 }, pickArr(words), true);
    for (let i = 0; i < 14; i++) {
      spawnBurst((Math.random() * PALETTE.length) | 0,
        pos.x + rnd(-60, 60), pos.y + rnd(-40, 40));
    }
    Sfx.softNote(660, 0.05, 2.2); Sfx.softNote(880, 0.04, 2.4); Sfx.softNote(1320, 0.025, 2.8);
    vibrate(24);
  }
}

/* Bir grubu patlat. Özel obje kuralları:
   - normal & zincirli (chain): aynı renkse gruba katılır ve birlikte patlar
   - buzlu (ice): doğrudan tek başına patlamaz; ama bir zincir-temizliğin parçasıysa,
     komşusu patlayınca 1 hasar alır (2 vuruşta kırılır)
   - taş (stone): hiçbir renge uymaz, sadece desteksiz kalınca düşer */
function popGroup(startKey, baseDelay) {
  const start = G.grid.get(startKey);
  if (!start || start.type === 'stone') return false;
  const idx = start.idx;
  const seen = new Set([startKey]);
  const q = [[startKey, 0]];
  const order = [];
  while (q.length) {
    const [k, d] = q.shift();
    order.push([k, d]);
    const [r, c] = k.split(',').map(Number);
    for (const nk of neighborKeys(r, c)) {
      if (seen.has(nk) || !G.grid.has(nk)) continue;
      const nb = G.grid.get(nk);
      // aynı renk VE (normal ya da zincirli) gruba katılır; taş/farklı renk katılmaz
      if (nb.idx === idx && nb.type !== 'stone' && nb.type !== 'ice') {
        seen.add(nk); q.push([nk, d + 1]);
      }
    }
  }
  if (order.length < 2) return false;
  const now = performance.now();

  // patlayan hücrelerin komşusundaki BUZLU objelere hasar ver (kırılırsa onlar da eriyir)
  const iceHit = new Set();
  for (const [k] of order) {
    const [r, c] = k.split(',').map(Number);
    for (const nk of neighborKeys(r, c)) {
      const nb = G.grid.get(nk);
      if (nb && nb.type === 'ice' && !iceHit.has(nk)) iceHit.add(nk);
    }
  }
  let d0 = 0;
  for (const [k, d] of order) {
    const b = G.grid.get(k);
    G.grid.delete(k);
    b.popAt = now + baseDelay + d * 85;
    b.depth = d; b.popStarted = 0;
    G.pops.push(b); G.pendingPops++;
    d0 = Math.max(d0, d);
  }
  // buzluları çatlat/kır
  for (const nk of iceHit) {
    const b = G.grid.get(nk);
    if (!b) continue;
    b.hp = (b.hp || 2) - 1;
    b.crackT = now; // çatlama animasyonu
    if (b.hp <= 0) {
      G.grid.delete(nk);
      b.popAt = now + baseDelay + (d0 + 1) * 85;
      b.depth = d0 + 1; b.popStarted = 0;
      G.pops.push(b); G.pendingPops++;
    }
  }
  G.combo++;
  const cp = cellPos(start.r, start.c);
  if (G.combo >= 2) UI.floatText(cp, 'zen ×' + G.combo);
  if (G.combo >= 3) spawnRipple(cp.x, cp.y, PALETTE[idx].c, true);
  comboFx(G.combo, cp, order.length);
  // patlamadan sonra desteksiz kalan taşları/objeleri düşür
  setTimeout(dropUnsupported, baseDelay + 120);
  return true;
}

/* Tavana (en üst satıra) bağlı olmayan tüm objeler düşer — taşları temizlemenin tek yolu */
function dropUnsupported() {
  if (G.grid.size === 0) return;
  const connected = new Set();
  const q = [];
  // en üst satırdaki her şey tavana bağlıdır
  for (const [k, b] of G.grid) {
    if (b.r === G.topRow) { connected.add(k); q.push(k); }
  }
  while (q.length) {
    const k = q.pop();
    const [r, c] = k.split(',').map(Number);
    for (const nk of neighborKeys(r, c)) {
      if (G.grid.has(nk) && !connected.has(nk)) { connected.add(nk); q.push(nk); }
    }
  }
  const now = performance.now();
  let fell = 0;
  for (const [k, b] of [...G.grid]) {
    if (!connected.has(k)) {
      G.grid.delete(k);
      b.popAt = now + fell * 30; b.depth = Math.min(fell, 6); b.popStarted = 0;
      b.falling = true; // düşme efekti
      G.pops.push(b); G.pendingPops++;
      fell++;
    }
  }
  if (fell > 0) checkResolutionSoon();
}

function attachFly() {
  const f = G.fly; G.fly = null; G.trail.length = 0;
  let cell = findSnapCell(f.x, f.y);
  if (!cell) {
    // emniyet: yakın pencere boşsa TÜM tahtada en yakın geçerli boş hücreyi ara —
    // atış asla boşa gitmez, top her koşulda bir yere yerleşir
    let best = null, bd = Infinity;
    const maxR = G.topRow + Math.ceil((LAUNCH.y - BALL_R * 3 - TOP) / ROWH);
    for (let r = G.topRow; r <= maxR; r++) {
      for (let c = 0; c <= maxColFor(r); c++) {
        if (G.grid.has(key(r, c))) continue;
        const p = cellPos(r, c);
        if (p.y > LAUNCH.y - BALL_R * 3) continue;
        if (r !== G.topRow) {
          let touch = false;
          for (const nk of neighborKeys(r, c)) if (G.grid.has(nk)) { touch = true; break; }
          if (!touch) continue;
        }
        const d = (p.x - f.x) ** 2 + (p.y - f.y) ** 2;
        if (d < bd) { bd = d; best = { r, c }; }
      }
    }
    cell = best;
  }
  if (!cell) {
    spawnRipple(f.x, f.y, PALETTE[f.idx] ? PALETTE[f.idx].c : '#FFFFFF', false);
    Sfx.drop(0);
    checkResolutionSoon();
    return;
  }
  const p = cellPos(cell.r, cell.c);
  const b = { r: cell.r, c: cell.c, idx: f.idx, ax: f.x, ay: f.y, settleT0: performance.now(), settleDur: 170 };
  G.grid.set(key(cell.r, cell.c), b);
  // ◈ joker: en büyük komşu grubun rengine bürünür; boyut eşitliğinde hedef renge öncelik verir
  if (f.rainbow) {
    let bestIdx = null, bestSize = 0;
    const sizes = new Map(); // idx -> grup boyutu (eşitlik kontrolü için)
    const tried = new Set();
    for (const nk of neighborKeys(cell.r, cell.c)) {
      const nb = G.grid.get(nk);
      if (!nb || nb === b || nb.type === 'stone' || nb.type === 'ice' || tried.has(nb.idx)) continue;
      tried.add(nb.idx);
      const seen = new Set([nk]); const q = [nk];
      while (q.length) {
        const k2 = q.pop(); const [r0, c0] = k2.split(',').map(Number);
        for (const nk2 of neighborKeys(r0, c0)) {
          const b2 = G.grid.get(nk2);
          if (b2 && b2 !== b && b2.type !== 'stone' && b2.type !== 'ice' && b2.idx === nb.idx && !seen.has(nk2)) { seen.add(nk2); q.push(nk2); }
        }
      }
      sizes.set(nb.idx, seen.size);
      if (seen.size > bestSize) { bestSize = seen.size; bestIdx = nb.idx; }
    }
    // eşit boyutlu birden fazla grup varsa ve biri hedef renkse, hedefe kesin öncelik ver
    if (G.mode === 'level' && sizes.get(G.targetIdx) === bestSize && sizes.size > 1) {
      let tie = 0;
      for (const sz of sizes.values()) if (sz === bestSize) tie++;
      if (tie > 1) bestIdx = G.targetIdx;
    }
    if (bestIdx != null) b.idx = bestIdx;
  }
  const popped = popGroup(key(cell.r, cell.c), 160);
  if (!popped) { G.combo = 0; Sfx.softNote(180, 0.045, 0.5); vibrate(4); }
  if (G.mode === 'zen' && !popped && p.y + BALL_R > H - 252) {
    G.resolveLock = true;
    setTimeout(() => UI.zenOver(), 500);
  }
  checkResolutionSoon();
}

/* ---------- Zen: yeni satır ---------- */
/* Zen zorluk eğrisi: skor yükseldikçe yeni satırlar sertleşir —
   buz/taş/zincir belirir ve yoğunlaşır. Yüksek skor gerçekten hak edilir. */
function zenTier() { return clamp(Math.floor(G.score / 800), 0, 8); } // ~her 800 puanda bir kademe
function addZenRow() {
  G.topRow -= 1;
  const r = G.topRow;
  const t0 = performance.now();
  const tier = zenTier();
  const ice = tier >= 1 ? Math.min(0.05 + tier * 0.025, 0.24) : 0;
  const stone = tier >= 2 ? Math.min(0.03 + tier * 0.02, 0.16) : 0;
  const chain = tier >= 3 ? Math.min(0.03 + tier * 0.022, 0.2) : 0;
  for (let c = 0; c <= maxColFor(r); c++) {
    if (Math.random() > 0.9) continue;
    const roll = Math.random();
    if (roll < stone) {
      G.grid.set(key(r, c), { r, c, idx: -1, type: 'stone', born: t0 + 120 + c * 26 });
      continue;
    }
    const cell = { r, c, idx: (Math.random() * PALETTE.length) | 0, born: t0 + 120 + c * 26 };
    const roll2 = Math.random();
    if (roll2 < ice) { cell.type = 'ice'; cell.hp = 2; }
    else if (roll2 < ice + chain) cell.type = 'chain';
    G.grid.set(key(r, c), cell);
  }
  G.scrollTarget += ROWH;
  for (const b of G.grid.values()) {
    const y = TOP + R + b.r * ROWH + G.scrollTarget;
    if (y + BALL_R > H - 252) {
      G.resolveLock = true;
      setTimeout(() => UI.zenOver(), 900);
      return;
    }
  }
}
/* iniş temposu da kademeyle hızlanır: 5 atış → 4 → 3 */
function zenDropEvery() { return zenTier() >= 6 ? 3 : zenTier() >= 3 ? 4 : 5; }

/* ---------- Tur sonucu ---------- */
function checkResolutionSoon() { setTimeout(checkResolution, 60); }
function checkResolution() {
  if (G.state !== 'playing' || G.fly || G.pendingPops > 0 || G.resolveLock) return;
  if (G.mode === 'level') {
    if (G.targetLeft <= 0) {
      G.resolveLock = true;
      celebrateLevel();
      setTimeout(() => UI.levelComplete(), 1150);
    } else if (G.shots <= 0) {
      G.resolveLock = true;
      setTimeout(() => UI.outOfShots(), 600);
    }
  } else {
    if (G.zenRowPending) { G.zenRowPending = false; addZenRow(); }
  }
}

/* ---------- Bölüm kutlaması — patlamadan farklı, çok daha görkemli ---------- */
function celebrateLevel() {
  const cx = W / 2, cy = H * 0.42;
  const nowMs = performance.now();
  // dalga dalga halka: hedef rengi → beyaz → dünya vurgusu
  spawnRipple(cx, cy, PALETTE[G.targetIdx].c, true);
  setTimeout(() => spawnRipple(cx, cy, '#FFFFFF', true), 180);
  setTimeout(() => spawnRipple(cx, cy, CUR_ACCENT, true), 380);
  // kutlama duyuları: yumuşak sarsıntı + flash + renk dalgası
  G.shake = 7; G.shakeT0 = nowMs;
  G.flash = 0.16; G.flashT0 = nowMs;
  G.hueWave = nowMs + 1400;
  // hedef sembolden dairesel konfeti patlaması — spawnBurst'ten daha geniş ve yavaş
  const shape = PALETTE[G.targetIdx].shape, color = PALETTE[G.targetIdx].c, now = performance.now();
  for (let i = 0; i < 22; i++) {
    const a = (i / 22) * TAU + rnd(-0.15, 0.15);
    const sp = rnd(90, 210);
    G.bursts.push({
      kind: 'p', shape, color,
      x: cx, y: cy, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 40,
      grav: 130, rot: rnd(0, TAU), vr: rnd(-5, 5),
      size: rnd(2.6, 5), t0: now + i * 8, life: rnd(1000, 1500), fade: 'shard',
    });
  }
  // ikinci renkten kıvılcım yağmuru — kutlamayı zenginleştirir
  const otherIdx = (G.targetIdx + 1 + ((Math.random() * (PALETTE.length - 1)) | 0)) % PALETTE.length;
  for (let i = 0; i < 10; i++) {
    G.bursts.push({
      kind: 'p', shape: PALETTE[otherIdx].shape, color: PALETTE[otherIdx].c,
      x: rnd(W * 0.15, W * 0.85), y: -10, vx: rnd(-16, 16), vy: rnd(30, 60),
      grav: 70, rot: rnd(0, TAU), vr: rnd(-4, 4),
      size: rnd(2, 3.6), t0: now + i * 60, life: rnd(1400, 2000), fade: 'twinkle',
    });
  }
  // üçüncü perde: tüm paletten gecikmeli yıldız seli — kutlama tek vuruşta bitmez, kabarır
  for (let i = 0; i < 26; i++) {
    const pi = i % PALETTE.length;
    G.bursts.push({
      kind: 'p', shape: PALETTE[pi].shape, color: PALETTE[pi].c,
      x: rnd(W * 0.05, W * 0.95), y: rnd(-40, -8), vx: rnd(-24, 24), vy: rnd(50, 110),
      grav: 60, rot: rnd(0, TAU), vr: rnd(-6, 6),
      size: rnd(2.2, 4.6), t0: now + 500 + i * 55, life: rnd(1600, 2400), fade: 'twinkle',
    });
  }
  Sfx.levelUp();
  vibrate([10, 30, 10, 30, 18]);
}
function launch(dir) {
  if (G.state !== 'playing' || G.fly) return;
  if (G.mode === 'level') {
    if (G.shots <= 0) return;
    G.shots--;
  } else {
    G.zenShots++;
    if (G.zenShots % zenDropEvery() === 0) G.zenRowPending = true;
  }
  G.fly = { x: LAUNCH.x, y: LAUNCH.y, vx: dir.x * SPEED, vy: dir.y * SPEED, idx: G.cur, rainbow: G.curRainbow };
  G.curRainbow = false;
  refillQueue(false);
  Sfx.whoosh();
  UI.refresh();
}

/* ---------- Canvas & Yerleşim ---------- */
let canvas, ctx, SC = 1, H = 800, DPR = 1;
const LAUNCH = { x: W / 2, y: 700 };
const NEXT_BALL = { dx: 74, dy: 18, hitR: 34 }; // "sıradaki" topun konumu + cömert dokunma alanı

function resize() {
  const vw = window.innerWidth, vh = window.innerHeight;
  const cssW = Math.min(vw, vh * 0.58, 520);
  const cssH = vh;
  SC = cssW / W;
  H = cssH / SC;
  DPR = window.devicePixelRatio || 1;
  canvas.width = Math.round(cssW * DPR);
  canvas.height = Math.round(cssH * DPR);
  canvas.style.width = cssW + 'px';
  canvas.style.height = cssH + 'px';
  document.getElementById('wrap').style.width = cssW + 'px';
  LAUNCH.y = H - 108;
  initDust();
}

function initDust() {
  G.dust = [];
  const kind = (CUR_PARTICLE && CUR_PARTICLE.kind) || 'stars';
  const n = kind === 'swirl' ? 34 : 42;
  for (let i = 0; i < n; i++) {
    if (kind === 'stars') {
      G.dust.push({ x: rnd(0, W), y: rnd(0, H), r: rnd(0.5, 1.6), v: rnd(1.2, 5), ph: rnd(0, TAU) });
    } else if (kind === 'swirl') {
      const cx = rnd(W * 0.2, W * 0.8), cy = rnd(H * 0.2, H * 0.8), rad = rnd(14, 90);
      G.dust.push({ cx, cy, rad, a: rnd(0, TAU), sp: rnd(0.06, 0.16) * (Math.random() < 0.5 ? -1 : 1), r: rnd(0.6, 1.8), ph: rnd(0, TAU) });
    } else if (kind === 'petals') {
      G.dust.push({ x: rnd(0, W), y: rnd(-H, H), r: rnd(2.4, 4.4), vy: rnd(9, 22), vx: rnd(-6, 10), rot: rnd(0, TAU), vr: rnd(-1, 1), ph: rnd(0, TAU) });
    } else if (kind === 'bubbles') {
      G.dust.push({ x: rnd(0, W), y: rnd(0, H), r: rnd(1.4, 4.2), v: rnd(10, 26), wob: rnd(6, 18), ph: rnd(0, TAU) });
    }
  }
}

/* ---------- Şekil Çizimi ---------- */
function tracePathShape(cx, shape, x, y, r) {
  cx.beginPath();
  if (shape === 'circle') { cx.arc(x, y, r, 0, TAU); return; }
  if (shape === 'square') {
    const h = r * 0.8;
    cx.moveTo(x - h, y - h); cx.lineTo(x + h, y - h);
    cx.lineTo(x + h, y + h); cx.lineTo(x - h, y + h);
    cx.closePath(); return;
  }
  let pts = [];
  if (shape === 'hex')      for (let i = 0; i < 6; i++)  pts.push([-Math.PI / 2 + i * TAU / 6, r]);
  if (shape === 'triangle') for (let i = 0; i < 3; i++)  pts.push([-Math.PI / 2 + i * TAU / 3, r]);
  if (shape === 'diamond')  for (let i = 0; i < 4; i++)  pts.push([-Math.PI / 2 + i * TAU / 4, r]);
  if (shape === 'star')     for (let i = 0; i < 10; i++) pts.push([-Math.PI / 2 + i * Math.PI / 5, i % 2 ? r * 0.46 : r]);
  // Joker'e özel dört uçlu ince "kıvılcım" — diğer altı semboldan tamamen farklı bir siluet
  if (shape === 'joker')    for (let i = 0; i < 8; i++)  pts.push([-Math.PI / 2 + i * TAU / 8, i % 2 ? r * 0.2 : r]);
  pts.forEach(([a, rr], i) => {
    const px = x + Math.cos(a) * rr, py = y + Math.sin(a) * rr;
    i ? cx.lineTo(px, py) : cx.moveTo(px, py);
  });
  cx.closePath();
}

function drawShapeCore(cx, shape, x, y, r, color, alpha, glow, rot) {
  cx.save();
  if (rot) { cx.translate(x, y); cx.rotate(rot); x = 0; y = 0; }
  cx.shadowColor = color;
  cx.shadowBlur = glow;
  tracePathShape(cx, shape, x, y, r);
  cx.globalAlpha = alpha * 0.12;
  cx.fillStyle = color;
  cx.fill();
  cx.globalAlpha = alpha;
  cx.lineWidth = 2.2;
  cx.strokeStyle = color;
  cx.stroke();
  cx.shadowBlur = 0;
  cx.globalAlpha = alpha * 0.6;
  cx.beginPath(); cx.arc(x, y, 1.8, 0, TAU); cx.fill();
  cx.restore();
}
/* hue kaydırma: hex rengi HSL uzayında döndürür (combo renk dalgası için) */
function hueShift(hex, deg) {
  const n = parseInt(hex.slice(1), 16);
  let r = ((n >> 16) & 255) / 255, g = ((n >> 8) & 255) / 255, b = (n & 255) / 255;
  const mx = Math.max(r, g, b), mn = Math.min(r, g, b); let h = 0, s = 0;
  const l = (mx + mn) / 2;
  if (mx !== mn) {
    const d = mx - mn;
    s = l > 0.5 ? d / (2 - mx - mn) : d / (mx + mn);
    h = mx === r ? ((g - b) / d + (g < b ? 6 : 0)) : mx === g ? (b - r) / d + 2 : (r - g) / d + 4;
    h /= 6;
  }
  h = (h + deg / 360) % 1; if (h < 0) h += 1;
  const q = l < 0.5 ? l * (1 + s) : l + s - l * s, p = 2 * l - q;
  const f = t => { t = ((t % 1) + 1) % 1; return t < 1 / 6 ? p + (q - p) * 6 * t : t < 1 / 2 ? q : t < 2 / 3 ? p + (q - p) * (2 / 3 - t) * 6 : p; };
  const to = v => Math.round(v * 255).toString(16).padStart(2, '0');
  return '#' + to(f(h + 1 / 3)) + to(f(h)) + to(f(h - 1 / 3));
}

function drawShape(cx, idx, x, y, r, alpha, glow) {
  let c = PALETTE[idx].c;
  // yüksek combo renk dalgası: renkler tahtada soldan sağa süzülen bir kaymayla ışıldar
  const nowMs = performance.now();
  if (G.hueWave > nowMs) {
    const rem = (G.hueWave - nowMs) / 1200;           // 1 → 0 sönüm
    const deg = Math.sin(nowMs * 0.004 + x * 0.02) * 70 * rem;
    c = hueShift(c, deg);
  }
  drawShapeCore(cx, PALETTE[idx].shape, x, y, r, c, alpha, glow);
}

/* Taş — renksiz gri kaya, hiçbir renge uymaz, sadece desteksiz kalınca düşer */
function drawStone(cx, x, y, r) {
  cx.save();
  cx.beginPath();
  for (let i = 0; i < 6; i++) {
    const a = -Math.PI / 2 + i * TAU / 6;
    const rr = r * (0.9 + 0.08 * Math.sin(i * 2.1));
    const px = x + Math.cos(a) * rr, py = y + Math.sin(a) * rr;
    i ? cx.lineTo(px, py) : cx.moveTo(px, py);
  }
  cx.closePath();
  cx.fillStyle = 'rgba(120,124,140,0.28)';
  cx.fill();
  cx.lineWidth = 2; cx.strokeStyle = 'rgba(150,155,175,0.7)';
  cx.stroke();
  // iç doku çizgileri
  cx.strokeStyle = 'rgba(90,94,110,0.6)'; cx.lineWidth = 1;
  cx.beginPath();
  cx.moveTo(x - r * 0.3, y - r * 0.2); cx.lineTo(x + r * 0.1, y + r * 0.1);
  cx.moveTo(x + r * 0.35, y - r * 0.35); cx.lineTo(x + r * 0.15, y - r * 0.05);
  cx.stroke();
  cx.restore();
}

/* Buzlu — renkli obje ama donmuş kabuk içinde; hasar aldıkça çatlar (2 vuruş) */
function drawIce(cx, b, x, y, r, now) {
  // içteki renkli sembol (soluk)
  drawShapeCore(cx, PALETTE[b.idx].shape, x, y, r * 0.7, PALETTE[b.idx].c, 0.5, 6);
  cx.save();
  // buz kabuğu
  cx.beginPath(); cx.arc(x, y, r, 0, TAU);
  cx.fillStyle = 'rgba(200,235,255,0.16)';
  cx.fill();
  cx.lineWidth = 2; cx.strokeStyle = 'rgba(190,230,255,0.8)';
  cx.shadowColor = 'rgba(190,230,255,0.6)'; cx.shadowBlur = 8;
  cx.stroke();
  cx.shadowBlur = 0;
  // çatlaklar: hasarlıysa (hp=1) daha belirgin
  const cracked = (b.hp || 2) <= 1;
  cx.strokeStyle = 'rgba(255,255,255,' + (cracked ? 0.85 : 0.4) + ')';
  cx.lineWidth = cracked ? 1.4 : 0.9;
  cx.beginPath();
  cx.moveTo(x, y - r * 0.7); cx.lineTo(x - r * 0.2, y); cx.lineTo(x + r * 0.15, y + r * 0.35);
  if (cracked) { cx.moveTo(x - r * 0.2, y); cx.lineTo(x - r * 0.6, y + r * 0.2); cx.moveTo(x + r * 0.15, y + r * 0.35); cx.lineTo(x + r * 0.5, y + r * 0.55); }
  cx.stroke();
  // yeni çatlama parlaması
  if (b.crackT && now - b.crackT < 300) {
    const a = 1 - (now - b.crackT) / 300;
    cx.strokeStyle = 'rgba(255,255,255,' + a + ')'; cx.lineWidth = 2;
    cx.beginPath(); cx.arc(x, y, r * (1 + (1 - a) * 0.3), 0, TAU); cx.stroke();
  }
  cx.restore();
}

/* Zincirli — renkli obje, halka zincirle sarılı; sadece zincirleme temizlikle kırılır */
function drawChainCell(cx, b, x, y, r, now) {
  drawShapeCore(cx, PALETTE[b.idx].shape, x, y, r * 0.78, PALETTE[b.idx].c, 0.9, 8);
  cx.save();
  cx.strokeStyle = 'rgba(210,205,180,0.75)';
  cx.lineWidth = 1.6;
  const links = 8, rot = now * 0.0004;
  for (let i = 0; i < links; i++) {
    const a = rot + i * TAU / links;
    const lx = x + Math.cos(a) * r * 0.92, ly = y + Math.sin(a) * r * 0.92;
    cx.beginPath();
    cx.ellipse(lx, ly, 3, 1.8, a, 0, TAU);
    cx.stroke();
  }
  cx.restore();
}
function rainbowColor(now) { return 'hsl(' + ((now * 0.06) % 360).toFixed(0) + ',85%,75%)'; }

/* ---------- Girdi — hassasiyet yumuşatmalı sapan ---------- */
function toLogical(e) {
  const rect = canvas.getBoundingClientRect();
  return { x: (e.clientX - rect.left) / SC, y: (e.clientY - rect.top) / SC };
}
/* İkili nişan sistemi:
   - Fırlatıcının ÜSTÜNE dokunursan: doğrudan hedefleme (ok oraya bakar)
   - Fırlatıcının ALTINA dokunursan: sapan modu (geriye çek, ters yöne nişan alır)
   Her iki his de aynı anda desteklenir, oyuncu hangisini isterse onu kullanır. */
function updateAimFromPointer() {
  const dx = G.pointer.x - LAUNCH.x, dy = G.pointer.y - LAUNCH.y;
  let ax, ay;
  if (dy > AIM_DEADZONE) {
    // SAPAN MODU: parmak fırlatıcının altında — çektiğin yönün TERSİNE nişan alınır
    G.slingMode = true;
    if (Math.hypot(dx, dy) < AIM_MIN_PULL) { G.aimRaw = null; return; }
    ax = -dx; ay = -dy;
  } else if (dy < -AIM_DEADZONE) {
    // DOĞRUDAN MOD: parmak yukarıda — ok doğrudan oraya bakar
    G.slingMode = false;
    ax = dx; ay = dy;
  } else {
    G.aimRaw = null; return; // tam yatay ölü bölge — yön belirsiz
  }
  const rawAngle = Math.atan2(ax, -ay); // dikeyden açı: + sağa, - sola
  const clamped = clamp(rawAngle, -AIM_MAX_ANGLE, AIM_MAX_ANGLE);
  G.aimRaw = { x: Math.sin(clamped), y: -Math.cos(clamped) };
}
function bindInput() {
  canvas.addEventListener('pointerdown', e => {
    Sfx.start();
    if (G.state !== 'playing' || G.fly) return;
    const p = toLogical(e);
    // sıradaki topa dokunma: mevcut topla yer değiştir
    const nx = LAUNCH.x + NEXT_BALL.dx, ny = LAUNCH.y + NEXT_BALL.dy;
    if ((p.x - nx) ** 2 + (p.y - ny) ** 2 < NEXT_BALL.hitR ** 2) {
      const tmp = G.cur; G.cur = G.next; G.next = tmp;
      if (!G.swapUsed) { G.swapUsed = true; store.set('zx_swapused', true); } // öğrenildi: dikkat çekmeyi bırak
      Sfx.click();
      vibrate(6);
      UI.refresh();
      return;
    }
    // doğrudan hedefleme: parmağın dokunduğu HER YER anında nişan noktası olur —
    // sapanı geriye çekmeye gerek yok, ok parmağın olduğu yöne çıkar
    G.aiming = true;
    G.pointer = p;
    G.aimRaw = null; G.aimVec = null;
    updateAimFromPointer();
    if (G.aimRaw) G.aimVec = { x: G.aimRaw.x, y: G.aimRaw.y }; // ilk temasta ok anında görünsün
    canvas.setPointerCapture(e.pointerId);
  });
  canvas.addEventListener('pointermove', e => {
    if (!G.aiming) return;
    G.pointer = toLogical(e);
    updateAimFromPointer();
  });
  const release = e => {
    if (!G.aiming) return;
    G.aiming = false;
    const v = G.aimVec || G.aimRaw;
    if (v) launch(v);
    G.aimVec = null; G.aimRaw = null; G.pointer = null;
  };
  canvas.addEventListener('pointerup', release);
  canvas.addEventListener('pointercancel', release);
}

function traceAim(dir) {
  let x = LAUNCH.x, y = LAUNCH.y, vx = dir.x, vy = dir.y;
  const pts = []; let dist = 0, hit = null;
  const step = 7;
  while (y > TOP - R && dist < 2200) {
    x += vx * step; y += vy * step; dist += step;
    if (x < R) { x = R; vx = -vx; }
    if (x > W - R) { x = W - R; vx = -vx; }
    let collided = false;
    for (const b of G.grid.values()) {
      const p = cellPos(b.r, b.c);
      if ((p.x - x) ** 2 + (p.y - y) ** 2 < (2 * BALL_R * 0.86) ** 2) { collided = true; break; }
    }
    if (collided) { hit = { x, y }; break; }
    if (dist % 24 < step) pts.push({ x, y, d: dist, vx, vy });
  }
  return { pts, hit };
}

/* ---------- Güncelleme ---------- */
function update(dt, now) {
  G.scrollY += (G.scrollTarget - G.scrollY) * Math.min(1, dt * 4.5);

  // nişan yumuşatma — parmak titremesi süzülür, hat sakin akar
  if (G.aiming && G.aimRaw) {
    if (!G.aimVec) G.aimVec = { x: G.aimRaw.x, y: G.aimRaw.y };
    const k = 1 - Math.exp(-dt * 11);
    G.aimVec.x = lerp(G.aimVec.x, G.aimRaw.x, k);
    G.aimVec.y = lerp(G.aimVec.y, G.aimRaw.y, k);
    const L = Math.hypot(G.aimVec.x, G.aimVec.y) || 1;
    G.aimVec.x /= L; G.aimVec.y /= L;
  } else if (G.aiming && !G.aimRaw) {
    G.aimVec = null;
  }

  const pk = (CUR_PARTICLE && CUR_PARTICLE.kind) || 'stars';
  for (const d of G.dust) {
    if (pk === 'stars') {
      d.y -= d.v * dt;
      if (d.y < -4) { d.y = H + 4; d.x = rnd(0, W); }
    } else if (pk === 'swirl') {
      d.a += d.sp * dt;
    } else if (pk === 'petals') {
      d.y += d.vy * dt; d.x += d.vx * dt + Math.sin(now * 0.0012 + d.ph) * 6 * dt;
      d.rot += d.vr * dt;
      if (d.y > H + 8) { d.y = -8; d.x = rnd(0, W); }
      if (d.x < -8) d.x = W + 8; if (d.x > W + 8) d.x = -8;
    } else if (pk === 'bubbles') {
      d.y -= d.v * dt;
      if (d.y < -6) { d.y = H + 6; d.x = rnd(0, W); }
    }
  }

  if (G.dispScore !== G.score) {
    G.dispScore += Math.ceil((G.score - G.dispScore) * Math.min(1, dt * 8));
    UI.refreshScore();
  }

  // ✦ sürpriz: zen akışında sessizce beliren nefes rehberi
  if (G.mode === 'zen' && G.state === 'playing' && G.breathNextAt && now >= G.breathNextAt) {
    G.breathNextAt = now + rnd(52000, 68000);
    UI.breathGuide();
  }

  if (G.fly) {
    const f = G.fly;
    // bekçi: top 5 sn'den uzun uçuyorsa (her ne sebeple olursa olsun) zorla yapıştır —
    // "top kayboldu, atış boşa gitti" durumu yapısal olarak imkânsız
    if (!f.bornAt) f.bornAt = now;
    if (now - f.bornAt > 5000) { attachFly(); return; }
    const sub = 3;
    for (let s = 0; s < sub && G.fly; s++) {
      f.x += f.vx * dt / sub;
      f.y += f.vy * dt / sub;
      if (f.x < R) { f.x = R; f.vx = -f.vx; }
      if (f.x > W - R) { f.x = W - R; f.vx = -f.vx; }
      const topEdge = TOP + R * 0.6 + G.topRow * ROWH + G.scrollY;
      if (f.y < topEdge) { attachFly(); break; }
      let done = false;
      for (const b of G.grid.values()) {
        const p = cellPos(b.r, b.c);
        if ((p.x - f.x) ** 2 + (p.y - f.y) ** 2 < (2 * BALL_R * 0.86) ** 2) { done = true; break; }
      }
      if (done) { attachFly(); break; }
    }
    if (G.fly) {
      G.trail.push({ x: f.x, y: f.y });
      if (G.trail.length > 7) G.trail.shift();
    }
  }

  for (let i = G.pops.length - 1; i >= 0; i--) {
    const b = G.pops[i];
    if (!b.popStarted && now >= b.popAt) {
      b.popStarted = now;
      const p = cellPos(b.r, b.c);
      b.px = p.x; b.py = p.y;
      const isStone = b.type === 'stone' || b.idx < 0;
      const col = isStone ? '#9AA0B5' : PALETTE[b.idx].c;
      spawnRipple(p.x, p.y, col, false);
      if (!isStone) spawnBurst(b.idx, p.x, p.y);
      Sfx.drop(b.depth);
      vibrate(b.falling ? 3 : 7);
      G.score += 15 * Math.max(1, G.combo);
      if (G.mode === 'level' && !isStone) {
        if (b.idx === G.targetIdx && G.targetLeft > 0) G.targetLeft--;
        G.levelCoins++;
      }
      G.coins += 1;
      UI.refresh();
    }
    if (b.popStarted) {
      const p = (now - b.popStarted) / 430;
      if (p >= 1) { G.pops.splice(i, 1); G.pendingPops--; if (G.pendingPops === 0) checkResolutionSoon(); }
    }
  }

  for (let i = G.ripples.length - 1; i >= 0; i--) {
    if (now - G.ripples[i].t0 > G.ripples[i].dur) G.ripples.splice(i, 1);
  }

  for (let i = G.bursts.length - 1; i >= 0; i--) {
    const b = G.bursts[i];
    if (now - b.t0 > b.life) { G.bursts.splice(i, 1); continue; }
    if (b.kind === 'p') {
      b.vy += b.grav * dt;
      b.x += b.vx * dt; b.y += b.vy * dt;
      b.rot += b.vr * dt;
    }
  }
}

/* ---------- Çizim ---------- */
function drawAurora(now) {
  for (const a of CUR_AURORA) {
    const cx = (a.x + Math.sin(now * a.sp + a.ph) * 0.10) * W;
    const cy = (a.y + Math.cos(now * a.sp * 1.35 + a.ph) * 0.08) * H;
    const rr = a.r * W * (1 + 0.10 * Math.sin(now * 0.00011 + a.ph));
    const grd = ctx.createRadialGradient(cx, cy, 0, cx, cy, rr);
    grd.addColorStop(0, 'rgba(' + a.c + ',' + (a.a != null ? a.a : 0.05) + ')');
    grd.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, W, H);
  }
}

function drawThemeParticles(now) {
  const p = CUR_PARTICLE || { kind: 'stars', color: '210,220,255' };
  const col = p.color;
  if (p.kind === 'stars') {
    for (const d of G.dust) {
      const tw = 0.25 + 0.2 * Math.sin(now * 0.001 + d.ph);
      ctx.fillStyle = 'rgba(' + col + ',' + (tw * 0.4).toFixed(3) + ')';
      ctx.beginPath(); ctx.arc(d.x, d.y, d.r, 0, TAU); ctx.fill();
    }
  } else if (p.kind === 'swirl') {
    // yıldız tozu: yavaşça yörüngede dönen ışık zerrecikleri
    for (const d of G.dust) {
      const x = d.cx + Math.cos(d.a) * d.rad, y = d.cy + Math.sin(d.a) * d.rad * 0.7;
      const tw = 0.3 + 0.25 * Math.sin(now * 0.0013 + d.ph);
      ctx.fillStyle = 'rgba(' + col + ',' + (tw * 0.5).toFixed(3) + ')';
      ctx.beginPath(); ctx.arc(x, y, d.r, 0, TAU); ctx.fill();
    }
  } else if (p.kind === 'petals') {
    // süzülen yapraklar
    for (const d of G.dust) {
      ctx.save();
      ctx.translate(d.x, d.y); ctx.rotate(d.rot);
      ctx.fillStyle = 'rgba(' + col + ',0.5)';
      ctx.beginPath();
      ctx.ellipse(0, 0, d.r, d.r * 0.55, 0, 0, TAU);
      ctx.fill();
      ctx.restore();
    }
  } else if (p.kind === 'bubbles') {
    // yükselen kabarcıklar — ince halka
    for (const d of G.dust) {
      const wx = d.x + Math.sin(now * 0.0016 + d.ph) * d.wob;
      ctx.strokeStyle = 'rgba(' + col + ',0.5)';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(wx, d.y, d.r, 0, TAU); ctx.stroke();
    }
  }
}

function render(now) {
  // combo sarsıntısı: 0.45 sn'de sönümlenen, yumuşak yaylı titreşim
  let shx = 0, shy = 0;
  if (G.shake > 0.2) {
    const st = (now - G.shakeT0) / 450;
    if (st >= 1) G.shake = 0;
    else {
      const amp = G.shake * (1 - st) * (1 - st);
      shx = Math.sin(now * 0.09) * amp;
      shy = Math.cos(now * 0.117) * amp * 0.7;
    }
  }
  ctx.setTransform(SC * DPR, 0, 0, SC * DPR, shx * SC * DPR, shy * SC * DPR);
  ctx.clearRect(-20, -20, W + 40, H + 40);
  // tema tabanı — arka plan değişimini anında ve belirgin kılar
  ctx.fillStyle = 'rgb(' + (CUR_BASE || '5,5,8') + ')';
  ctx.fillRect(-20, -20, W + 40, H + 40);

  // her zaman görünen üst/alt renk bantları — tahta ne kadar dolu olursa olsun
  // tema değişimi ilk bakışta fark edilsin
  const wash = CUR_WASH || '150,180,255';
  const topWash = ctx.createLinearGradient(0, 0, 0, H * 0.34);
  topWash.addColorStop(0, 'rgba(' + wash + ',0.16)');
  topWash.addColorStop(1, 'rgba(' + wash + ',0)');
  ctx.fillStyle = topWash;
  ctx.fillRect(0, 0, W, H * 0.34);
  const botWash = ctx.createLinearGradient(0, H, 0, H * 0.6);
  botWash.addColorStop(0, 'rgba(' + wash + ',0.14)');
  botWash.addColorStop(1, 'rgba(' + wash + ',0)');
  ctx.fillStyle = botWash;
  ctx.fillRect(0, H * 0.6, W, H * 0.4);

  drawAurora(now);
  drawThemeParticles(now);

  if (G.mode === 'zen' && G.state === 'playing') {
    ctx.strokeStyle = 'rgba(255,158,210,0.14)';
    ctx.setLineDash([3, 9]); ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(14, H - 252); ctx.lineTo(W - 14, H - 252); ctx.stroke();
    ctx.setLineDash([]);
  }

  // ızgara objeleri — doğuş dalgası + nefes salınımı
  for (const b of G.grid.values()) {
    if (b.born && now < b.born) continue;
    let scl = 1;
    if (b.born) {
      const bt = (now - b.born) / 340;
      if (bt >= 1) b.born = 0;
      else scl = Math.max(0.02, easeOutBack(bt));
    }
    let p = cellPos(b.r, b.c);
    if (b.settleT0) {
      const t = (now - b.settleT0) / b.settleDur;
      if (t >= 1) { b.settleT0 = 0; }
      else { const e = easeOutCubic(t); p = { x: lerp(b.ax, p.x, e), y: lerp(b.ay, p.y, e) }; }
    }
    const bob = Math.sin(now * 0.0011 + b.r * 1.7 + b.c * 0.9) * 1.3;
    const rr = BALL_R * 0.82 * scl;
    if (b.type === 'stone') drawStone(ctx, p.x, p.y + bob, rr);
    else if (b.type === 'ice') drawIce(ctx, b, p.x, p.y + bob, rr, now);
    else if (b.type === 'chain') drawChainCell(ctx, b, p.x, p.y + bob, rr, now);
    else drawShape(ctx, b.idx, p.x, p.y + bob, rr, 0.96, 10);
  }

  for (const b of G.pops) {
    const isStone = b.type === 'stone' || b.idx < 0;
    const drawOne = (x, y, r, alpha, glow) => {
      if (isStone) drawStone(ctx, x, y, r);
      else drawShapeCore(ctx, PALETTE[b.idx].shape, x, y, r, PALETTE[b.idx].c, alpha, glow);
    };
    if (!b.popStarted) {
      const p = cellPos(b.r, b.c);
      drawOne(p.x, p.y, BALL_R * 0.82, 0.96, 10);
    } else {
      const t = clamp((now - b.popStarted) / 430, 0, 1);
      const e = easeInOut(t);
      // düşen objeler aşağı süzülür, patlayanlar küçülerek erir
      const yOff = b.falling ? e * 40 : -e * 5;
      drawOne(b.px, b.py + yOff, BALL_R * 0.82 * (1 - e * (b.falling ? 0.5 : 1)), (1 - e) * 0.95, 16 * (1 - e) + 4);
    }
  }

  for (const rp of G.ripples) {
    const t = clamp((now - rp.t0) / rp.dur, 0, 1);
    const e = easeOutCubic(t);
    for (let ring = 0; ring < 2; ring++) {
      const rr = BALL_R * 0.5 + e * rp.maxR * (1 - ring * 0.22);
      const a = (1 - t) * (ring ? 0.2 : 0.42);
      if (a <= 0.01 || rr <= 0) continue;
      ctx.strokeStyle = hexToRgba(rp.color, a);
      ctx.lineWidth = lerp(2.6, 0.4, e);
      ctx.beginPath(); ctx.arc(rp.x, rp.y, rr, 0, TAU); ctx.stroke();
    }
  }

  // sembole özgü patlama parçacıkları
  for (const b of G.bursts) {
    const t = clamp((now - b.t0) / b.life, 0, 1);
    if (b.kind === 'glint') {
      const e = 1 - t;
      const x2 = b.x + Math.cos(b.a) * b.len * (0.4 + t * 0.9);
      const y2 = b.y + Math.sin(b.a) * b.len * (0.4 + t * 0.9);
      ctx.save();
      ctx.globalAlpha = e * 0.85;
      ctx.strokeStyle = b.color; ctx.lineWidth = 1.6;
      ctx.shadowColor = b.color; ctx.shadowBlur = 8;
      ctx.beginPath(); ctx.moveTo(b.x, b.y); ctx.lineTo(x2, y2); ctx.stroke();
      ctx.restore();
      continue;
    }
    let alpha;
    if (b.fade === 'twinkle') alpha = (1 - t) * (0.55 + 0.45 * Math.sin(t * 26));
    else alpha = 1 - t;
    alpha = clamp(alpha, 0, 1);
    const sc = b.fade === 'drip' ? lerp(1, 0.3, t) : lerp(1, 0.15, t);
    drawShapeCore(ctx, b.shape, b.x, b.y, Math.max(0.3, b.size * sc), b.color, alpha, 6, b.rot);
  }

  if (G.fly) {
    const rb = G.fly.rainbow;
    G.trail.forEach((t, i) => {
      const a = (i + 1) / G.trail.length * 0.28;
      ctx.fillStyle = rb
        ? 'hsla(' + ((now * 0.06 + i * 22) % 360).toFixed(0) + ',85%,75%,' + a.toFixed(2) + ')'
        : hexToRgba(PALETTE[G.fly.idx].c, a);
      ctx.beginPath(); ctx.arc(t.x, t.y, BALL_R * 0.3 * (i + 1) / G.trail.length + 1, 0, TAU); ctx.fill();
    });
    if (rb) drawShapeCore(ctx, 'joker', G.fly.x, G.fly.y, BALL_R * 0.82, rainbowColor(now), 1, 18);
    else drawShape(ctx, G.fly.idx, G.fly.x, G.fly.y, BALL_R * 0.82, 1, 16);
  }

  // nefes alan vinyet — kenarlar usulca kararıp açılır, tema rengiyle boyanır
  const vg = ctx.createRadialGradient(W / 2, H * 0.46, H * 0.28, W / 2, H * 0.5, H * 0.78);
  vg.addColorStop(0, 'rgba(0,0,0,0)');
  vg.addColorStop(1, 'rgba(' + (CUR_WASH || '5,5,10') + ',' + (0.13 + 0.03 * Math.sin(now * 0.0004)).toFixed(3) + ')');
  ctx.fillStyle = vg;
  ctx.fillRect(0, 0, W, H);

  // combo flaşı: 0.35 sn'de sönen, vurgu renginde yumuşak parlama
  if (G.flash > 0.005) {
    const ft = (now - G.flashT0) / 350;
    if (ft >= 1) G.flash = 0;
    else {
      ctx.fillStyle = hexToRgba(CUR_ACCENT, G.flash * (1 - ft));
      ctx.fillRect(-20, -20, W + 40, H + 40);
    }
  }

  if (G.state === 'playing') drawLauncher(now);
}

function drawLauncher(now) {
  ctx.strokeStyle = hexToRgba(CUR_ACCENT, 0.22);
  ctx.lineWidth = 1.4;
  ctx.beginPath(); ctx.arc(LAUNCH.x, LAUNCH.y, BALL_R * 1.5, 0, TAU); ctx.stroke();

  if (G.aiming && G.aimVec) {
    const { pts, hit } = traceAim(G.aimVec);
    const col = PALETTE[G.cur].c;

    // ince, süzülen kılavuz çizgisi — noktaları bağlayan yumuşak bir zemin
    ctx.save();
    ctx.strokeStyle = hexToRgba(CUR_ACCENT, 0.20);
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(LAUNCH.x, LAUNCH.y);
    for (const p of pts) ctx.lineTo(p.x, p.y);
    if (hit) ctx.lineTo(hit.x, hit.y);
    ctx.stroke();
    ctx.restore();

    // yön gösteren, uzaklıkla incelen ok işaretleri (>>) — profesyonel nişan hissi
    pts.forEach((p, i) => {
      const a = clamp(1 - p.d / 1250, 0.1, 0.95);
      const ang = Math.atan2(p.vy, p.vx);
      const len2 = lerp(7, 4.5, clamp(p.d / 900, 0, 1));
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(ang);
      ctx.strokeStyle = hexToRgba(col, a);
      ctx.lineWidth = 1.8;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(-len2 * 0.55, -len2); ctx.lineTo(len2 * 0.55, 0); ctx.lineTo(-len2 * 0.55, len2);
      ctx.stroke();
      ctx.restore();
    });

    // varış noktası — kamera odak parantezli, nabız atan hedef reticle
    if (hit) {
      const pulse = 1 + 0.08 * Math.sin(now * 0.006);
      const rr = BALL_R * 0.95 * pulse;
      const cl = rr * 0.34;
      ctx.save();
      ctx.strokeStyle = hexToRgba(col, 0.75);
      ctx.lineWidth = 1.6;
      ctx.lineCap = 'round';
      ctx.shadowColor = col; ctx.shadowBlur = 6;
      [[-1, -1], [1, -1], [1, 1], [-1, 1]].forEach(([sx, sy]) => {
        const cx = hit.x + sx * rr, cy = hit.y + sy * rr;
        ctx.beginPath();
        ctx.moveTo(cx - sx * cl, cy); ctx.lineTo(cx, cy); ctx.lineTo(cx, cy - sy * cl);
        ctx.stroke();
      });
      ctx.shadowBlur = 0;
      ctx.fillStyle = hexToRgba(col, 0.85);
      ctx.beginPath(); ctx.arc(hit.x, hit.y, 1.8, 0, TAU); ctx.fill();
      ctx.restore();
    }
  }

  let ox = 0, oy = 0;
  if (G.aiming && G.aimVec) {
    if (G.slingMode && G.pointer) {
      // sapan: top parmağa doğru gerilir + elastik bant görünür
      const dx = G.pointer.x - LAUNCH.x, dy = G.pointer.y - LAUNCH.y;
      const len = Math.hypot(dx, dy) || 1;
      const pull = Math.min(len, 70) * 0.4;
      ox = dx / len * pull; oy = dy / len * pull;
      ctx.save();
      ctx.strokeStyle = hexToRgba(PALETTE[G.cur].c, 0.22);
      ctx.lineWidth = 1.6; ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(LAUNCH.x - ox * 0.5, LAUNCH.y - oy * 0.5);
      ctx.lineTo(LAUNCH.x + ox, LAUNCH.y + oy);
      ctx.stroke();
      ctx.restore();
    } else {
      const lean = 9; // doğrudan mod: küçük "atışa hazır" eğilimi
      ox = G.aimVec.x * lean; oy = G.aimVec.y * lean;
    }
  }
  if (!G.fly) {
    const puls = 1 + 0.03 * Math.sin(now * 0.002);
    if (G.curRainbow) drawShapeCore(ctx, 'joker', LAUNCH.x + ox, LAUNCH.y + oy, BALL_R * 0.82 * puls, rainbowColor(now), 1, 16);
    else drawShape(ctx, G.cur, LAUNCH.x + ox, LAUNCH.y + oy, BALL_R * 0.82 * puls, 1, 14);
  }
  const nbx = LAUNCH.x + NEXT_BALL.dx, nby = LAUNCH.y + NEXT_BALL.dy;
  const learned = G.swapUsed; // oyuncu daha önce değiştirmeyi kullandı mı?
  // Öğrenmemişse dikkat çek: parlak, nabız atan halka; öğrenmişse sade dursun
  const pulse = 0.5 + 0.5 * Math.sin(now * 0.004);
  const ringA = learned ? 0.14 + 0.05 * Math.sin(now * 0.0025) : 0.35 + 0.4 * pulse;
  const ringC = learned ? '255,255,255' : '125,240,192';
  ctx.strokeStyle = 'rgba(' + ringC + ',' + ringA + ')';
  ctx.lineWidth = learned ? 1 : 1.6;
  ctx.setLineDash([2, 4]);
  ctx.beginPath(); ctx.arc(nbx, nby, BALL_R * (learned ? 0.68 : 0.72 + 0.05 * pulse), 0, TAU); ctx.stroke();
  ctx.setLineDash([]);

  drawShape(ctx, G.next, nbx, nby, BALL_R * 0.45, learned ? 0.5 : 0.85, learned ? 6 : 12);

  // ⇄ değiştirme ikonu — iki topun arasında, her zaman görünür
  const swx = (LAUNCH.x + nbx) / 2 + 4, swy = nby - BALL_R * 0.95;
  const iconA = learned ? 0.3 : 0.55 + 0.45 * pulse;
  ctx.save();
  ctx.strokeStyle = 'rgba(' + ringC + ',' + iconA + ')';
  ctx.lineWidth = 1.4; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  if (!learned) { ctx.shadowColor = '#7DF0C0'; ctx.shadowBlur = 8; }
  const aw = 7, ah = 2.6;
  // üst ok (sola)
  ctx.beginPath();
  ctx.moveTo(swx + aw, swy - ah); ctx.lineTo(swx - aw, swy - ah);
  ctx.moveTo(swx - aw + 3, swy - ah - 2.6); ctx.lineTo(swx - aw, swy - ah); ctx.lineTo(swx - aw + 3, swy - ah + 2.6);
  ctx.stroke();
  // alt ok (sağa)
  ctx.beginPath();
  ctx.moveTo(swx - aw, swy + ah); ctx.lineTo(swx + aw, swy + ah);
  ctx.moveTo(swx + aw - 3, swy + ah - 2.6); ctx.lineTo(swx + aw, swy + ah); ctx.lineTo(swx + aw - 3, swy + ah + 2.6);
  ctx.stroke();
  ctx.restore();

  ctx.fillStyle = learned ? 'rgba(255,255,255,0.32)' : 'rgba(125,240,192,' + (0.6 + 0.4 * pulse) + ')';
  ctx.font = (learned ? '9px' : '600 9.5px') + ' system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(learned ? T('next') : T('swapLabel'), nbx, LAUNCH.y + 40);

  if (G.mode === 'level') {
    const low = G.shots <= 3;
    ctx.fillStyle = low ? 'rgba(255,158,158,0.92)' : 'rgba(255,255,255,0.55)';
    ctx.font = '300 14px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(T('shotsLeft', { n: G.shots }), LAUNCH.x, LAUNCH.y + 54);
  } else if (G.mode === 'zen') {
    const de = zenDropEvery();
    const untilDrop = de - (mod(G.zenShots, de));
    const soon = untilDrop <= 1;
    ctx.fillStyle = soon ? 'rgba(255,158,210,0.9)' : 'rgba(255,255,255,0.4)';
    ctx.font = '300 12.5px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(T('untilDescent', { n: untilDrop }), LAUNCH.x, LAUNCH.y + 54);
  }
}

/* ---------- Ana Döngü ---------- */
let lastT = 0;
/* Kendini toparlayan oyun döngüsü: tek bir karede hata olsa bile
   rAF zinciri ASLA kopmaz — kare atlanır, oyun akmaya devam eder. */
let loopErrAt = 0;
function loop(t) {
  const dt = Math.min((t - lastT) / 1000, 0.033);
  lastT = t;
  try {
    update(dt, t);
    render(t);
  } catch (e) {
    // aynı hatayı spam'lemeden bildir (test modunda görünür — ekran görüntüsüyle raporlanabilir)
    if (TEST_UNLOCK_ALL && t - loopErrAt > 4000 && typeof UI !== 'undefined' && UI.toast) {
      loopErrAt = t;
      try { UI.toast('⚠ ' + (e.message || e).toString().slice(0, 80)); } catch (e2) {}
    }
    try { console.error('frame error:', e); } catch (e2) {}
  }
  requestAnimationFrame(loop);
}

/* ---------- Arayüz (DOM) ---------- */
const UI = (() => {

  let el = {};
  let tutIdx = 0, tutFirst = false, splashDone = false, tiTimer = null;

  function init() {
    el = {
      hud: $('hud'),
      lvlLbl: $('lvlLbl'), lvlVal: $('lvlVal'),
      target: $('chipTarget'), tgtLbl: $('tgtLbl'), tCount: $('tCount'), tIcon: $('tIcon'),
      shots: $('chipShots'), shotLbl: $('shotLbl'), shotsVal: $('shotsVal'),
      scoreLbl: $('scoreLbl'), scoreVal: $('scoreVal'),
      goldLbl: $('goldLbl'), coinsVal: $('coinsVal'),
      bestChip: $('chipBest'), bestLbl: $('bestLbl'), bestVal: $('bestVal'),
      menu: $('menuOverlay'), menuSub: $('menuSub'), menuFoot: $('menuFoot'),
      modal: $('modal'), fx: $('fx'),
      btnMute: $('btnMute'),
      mLevelBtn: $('mLevelBtn'), mZenBtn: $('mZenBtn'), mShopBtn: $('mShopBtn'),
      langBtn: $('langBtn'), howBtn: $('howBtn'),
      joker: $('jokerBtn'),
      map: $('mapOverlay'), mapNodes: $('mapNodes'), mapSvg: $('mapSvg'),
      worlds: $('worldsOverlay'), worldList: $('worldList'), worldCoins: $('worldCoins'),
      worldsTitleTxt: $('worldsTitleTxt'),
      mapScroll: $('mapScroll'), mapCoins: $('mapCoins'), mapTitleTxt: $('mapTitleTxt'),
      shop: $('shopOverlay'), shopList: $('shopList'), shopCoins: $('shopCoins'),
      shopScroll: $('shopScroll'), shopTitleTxt: $('shopTitleTxt'),
      splash: $('splash'), splashSub: $('splashSub'),
      tut: $('tutOverlay'), tutCard: $('tutCard'), tutGlyph: $('tutGlyph'),
      tutText: $('tutText'), tutDots: $('tutDots'), tutNext: $('tutNext'), tutSkip: $('tutSkip'),
      ti: $('targetIntro'), tiCv: $('tiCanvas'), tiText: $('tiText'), tiSub: $('tiSub'),
      breath: $('breathGuide'), breathTxt: $('breathTxt'),
    };
    $('btnPause').addEventListener('click', pauseMenu);
    $('mapBack').addEventListener('click', () => { Sfx.click(); showWorlds(); });
    $('worldsBack').addEventListener('click', () => { Sfx.click(); showMenu(); });
    $('shopBack').addEventListener('click', () => { Sfx.click(); showMenu(); });
    el.btnMute.addEventListener('click', () => {
      const m = Sfx.toggleMute();
      el.btnMute.textContent = m ? '◌' : '♪';
      Sfx.click();
    });
    el.mLevelBtn.addEventListener('click', () => { Sfx.start(); Sfx.click(); showWorlds(); });
    el.mShopBtn.addEventListener('click', () => { Sfx.start(); Sfx.click(); showShop(); });
    el.howBtn.addEventListener('click', () => { Sfx.start(); Sfx.click(); showTutorial(false); });
    el.langBtn.addEventListener('click', () => {
      LANG = LANG === 'tr' ? 'en' : 'tr';
      store.set('zx_lang', LANG);
      Sfx.click();
      applyLang();
    });
    el.mZenBtn.addEventListener('click', () => {
      Sfx.start();
      if (G.zenUnlocked) { Sfx.click(); startZen(); return; }
      G.zenTaps++;
      if (G.zenTaps >= 5) {
        G.zenUnlocked = true; store.set('zx_zen', true);
        toast(T('devUnlock'));
        refreshMenu();
      } else {
        toast(T('zenLockToast'));
      }
    });
    el.joker.addEventListener('click', () => {
      if (G.state !== 'playing' || G.curRainbow) return;
      if (G.coins < JOKER_COST) { toast(T('needGold', { n: JOKER_COST })); return; }
      G.coins -= JOKER_COST; saveCoins();
      G.curRainbow = true;
      Sfx.click();
      toast(T('jokerReady'));
      refresh();
    });
    el.tutNext.addEventListener('click', tutAdvance);
    el.tutSkip.addEventListener('click', () => { Sfx.click(); finishTut(); });
    applyLang();
  }

  /* ---- splash: açılış töreni ---- */
  function boot() {
    el.splash.addEventListener('pointerdown', () => { Sfx.start(); proceedSplash(); });
    setTimeout(proceedSplash, 4300);
  }
  function proceedSplash() {
    if (splashDone) return; splashDone = true;
    el.splash.classList.add('gone');
    setTimeout(() => el.splash.classList.add('hidden'), 700);
    if (!store.get('zx_tut', false)) showTutorial(true);
    else { showMenu(); dailyGift(); }
  }

  /* ---- günlük sükunet hediyesi ---- */
  function dailyGift() {
    const today = new Date().toISOString().slice(0, 10);
    if (store.get('zx_day', '') !== today) {
      store.set('zx_day', today);
      G.coins += 30; saveCoins();
      setTimeout(() => toast(T('daily')), 900);
    }
  }

  /* ---- eğitim ---- */
  function showTutorial(first) {
    tutFirst = !!first;
    tutIdx = 0;
    G.state = 'menu';
    ['menu', 'map', 'shop', 'hud', 'joker', 'worlds'].forEach(k => el[k] && el[k].classList.add('hidden'));
    hideModal();
    el.tut.classList.remove('hidden');
    renderTutSlide();
  }
  const TUT_GLYPHS = ['➳', '✦', '◎', '⇄', '∞'];
  const TUT_KEYS = ['tutS1', 'tutS2', 'tutS3', 'tutS4', 'tutS5'];
  const TUT_LAST = TUT_KEYS.length - 1;
  function renderTutSlide() {
    el.tutGlyph.textContent = TUT_GLYPHS[tutIdx];
    el.tutText.innerHTML = T(TUT_KEYS[tutIdx]);
    el.tutDots.innerHTML = TUT_KEYS.map((_, i) => '<span class="' + (i === tutIdx ? 'on' : '') + '"></span>').join('');
    el.tutNext.textContent = tutIdx === TUT_LAST ? T('tutStart') : T('tutNext');
    el.tutSkip.style.visibility = tutIdx === TUT_LAST ? 'hidden' : 'visible';
    el.tutCard.classList.remove('slidein'); void el.tutCard.offsetWidth;
    el.tutCard.classList.add('slidein');
  }
  function tutAdvance() {
    Sfx.start(); Sfx.click();
    if (tutIdx < TUT_LAST) { tutIdx++; renderTutSlide(); return; }
    finishTut();
  }
  function finishTut() {
    store.set('zx_tut', true);
    el.tut.classList.add('hidden');
    showMenu();
    if (tutFirst) { tutFirst = false; dailyGift(); }
  }

  /* ---- hedef tanıtımı: sembol törenle sahneye gelir, HUD'a süzülür ---- */
  function targetIntro() {
    const d = window.devicePixelRatio || 1;
    el.tiCv.width = 120 * d; el.tiCv.height = 120 * d;
    const c2 = el.tiCv.getContext('2d');
    c2.setTransform(d, 0, 0, d, 0, 0);
    c2.clearRect(0, 0, 120, 120);
    drawShapeCore(c2, PALETTE[G.targetIdx].shape, 60, 62, 40, PALETTE[G.targetIdx].c, 1, 22);

    tiTimer = setTimeout(() => {
      el.ti.classList.remove('show');
      el.ti.classList.add('fly');
      setTimeout(() => { el.ti.classList.add('hidden'); el.ti.classList.remove('fly'); }, 700);

  /* ---- dil ---- */
  function applyLang() {
    const set = (n, k) => { if (el[n]) el[n].textContent = T(k); };
    set('tgtLbl', 'lblTarget'); set('shotLbl', 'lblShots'); set('scoreLbl', 'lblScore');
    set('goldLbl', 'lblGold'); set('bestLbl', 'lblBest');
    set('menuSub', 'menuSub'); set('menuFoot', 'menuFoot');
    set('shopTitleTxt', 'shopTitle'); set('worldsTitleTxt', 'worldsTitle');
    set('howBtn', 'howTo'); set('splashSub', 'tapHint'); set('breathTxt', 'breathTxt');
