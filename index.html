    el.langBtn.textContent = LANG.toUpperCase();
    refreshMenu();
    if (G.state === 'playing') refresh();
    if (!el.shop.classList.contains('hidden')) buildShop();
    if (el.worlds && !el.worlds.classList.contains('hidden')) buildWorlds();
    if (!el.map.classList.contains('hidden')) buildMap();
    if (!el.tut.classList.contains('hidden')) renderTutSlide();
  }

  /* ---- HUD ---- */
  function drawTargetIcon() {
    const c = el.tIcon, cx = c.getContext('2d');
    const s = 22 * (window.devicePixelRatio || 1);
    if (c.width !== s) { c.width = s; c.height = s; }
    cx.setTransform(s / 22, 0, 0, s / 22, 0, 0);
    cx.clearRect(0, 0, 22, 22);
    drawShapeCore(cx, PALETTE[G.targetIdx].shape, 11, 11.5, 7.5, PALETTE[G.targetIdx].c, 1, 5);
  }
  function refresh() {
    const zen = G.mode === 'zen';
    el.lvlLbl.textContent = zen ? T('lblMode') : T('lblSection');
    el.lvlVal.textContent = zen ? T('zen') : G.level;
    el.target.style.display = zen ? 'none' : 'flex';
    el.shots.style.display = zen ? 'none' : 'flex';
    el.bestChip.style.display = zen ? 'flex' : 'none';
    if (!zen) {
      el.tCount.textContent = Math.max(0, G.targetLeft);
      el.shotsVal.textContent = G.shots;
      el.shotsVal.style.color = G.shots <= 3 ? '#FF9E9E' : '';
      drawTargetIcon();
    } else {
      el.bestVal.textContent = '♛ ' + Math.max(G.best, G.score);
      el.bestChip.classList.toggle('crowned', G.score > G.zenStartBest && G.score > 0);
    }
    el.coinsVal.textContent = '⬡ ' + G.coins;
    el.joker.classList.toggle('ready', G.curRainbow);
    el.joker.classList.toggle('off', !G.curRainbow && G.coins < JOKER_COST);
    el.joker.innerHTML = G.curRainbow ? T('jokerSet') : T('joker');
    refreshScore();
  }
  function refreshScore() { el.scoreVal.textContent = G.dispScore; }

  /* ---- ekran geçişleri ---- */
  function enterGame() {
    ['menu', 'map', 'shop', 'tut', 'worlds'].forEach(k => el[k] && el[k].classList.add('hidden'));
    hideModal();
    el.hud.classList.remove('hidden');
    el.joker.classList.remove('hidden');
    refresh();
  }
  function refreshMenu() {
    el.mLevelBtn.innerHTML = T('journey', { n: Math.min(G.maxLevel, MAX_LEVEL) });
    el.mZenBtn.innerHTML = G.zenUnlocked ? T('zenBtn', { n: G.best }) : T('zenBtnLocked');
    el.mZenBtn.classList.toggle('locked', !G.zenUnlocked);
  }
  function showMenu() {
    G.state = 'menu';
    G.themeWorld = null; applyThemes();
    endTrial();
    ['hud', 'joker', 'map', 'shop', 'tut', 'worlds'].forEach(k => el[k] && el[k].classList.add('hidden'));
    if (el.breath) el.breath.classList.add('hidden');
    hideModal();
    refreshMenu();
    el.menu.classList.remove('hidden');
  }

  /* ---- yolculuk haritası — akan patika, dalga dalga beliren duraklar ---- */
  function buildMap() {
    const w = G.viewWorld;
    const first = worldStart(w), last = worldEnd(w);
    const N = LEVELS_PER_WORLD;             // her zaman sadece 100 düğüm — 1000 asla
    const wPix = el.mapScroll.clientWidth || 320;
    const hPix = N * 78 + 170;
    el.mapNodes.innerHTML = '';
    el.mapNodes.style.height = hPix + 'px';
    el.mapSvg.setAttribute('width', wPix);
    el.mapSvg.setAttribute('height', hPix);
    const acc = WORLDS[w].accent;
    const pts = [];
    for (let k = 0; k < N; k++) {
      const lvl = first + k;
      pts.push({ lvl, x: wPix * (0.5 + Math.sin(lvl * 0.8) * 0.28), y: hPix - 96 - k * 78 });
    }
    const toStr = arr => arr.map(p => p.x.toFixed(1) + ',' + p.y.toFixed(1)).join(' ');
    // bu dünyada kaçıncı seviyeye kadar ilerlemiş
    const doneInWorld = clamp(G.maxLevel - first, 0, N);
    const flowPts = pts.slice(0, Math.max(1, doneInWorld));
    const flowPath = flowPts.map((p, i) => (i ? 'L' : 'M') + p.x.toFixed(1) + ',' + p.y.toFixed(1)).join(' ');
    const dur = Math.max(6, flowPts.length * 0.7);
    const mkLight = (r, del, durMul, op) =>
      '<circle r="' + r + '" fill="' + acc + '" style="filter:drop-shadow(0 0 ' + (r * 2) + 'px ' + acc + ')">' +
      '  <animateMotion dur="' + (dur * durMul) + 's" begin="' + del + 's" repeatCount="indefinite" rotate="auto">' +
      '    <mpath href="#flowPathRef" xlink:href="#flowPathRef"/>' +
      '  </animateMotion>' +
      '  <animate attributeName="opacity" values="0;' + op + ';' + op + ';0" keyTimes="0;0.06;0.92;1" dur="' + (dur * durMul) + 's" begin="' + del + 's" repeatCount="indefinite"/>' +
      '</circle>';
    el.mapSvg.innerHTML =
      '<polyline points="' + toStr(pts) + '" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="2" stroke-dasharray="1 9" stroke-linecap="round"/>' +
      (flowPts.length > 1 ?
        // tamamlanan yol: nabız gibi akan çizgi (dash kayması)
        '<polyline points="' + toStr(flowPts) + '" fill="none" stroke="' + acc + '" stroke-opacity="0.45" stroke-width="2" stroke-dasharray="1 9" stroke-linecap="round">' +
        '  <animate attributeName="stroke-dashoffset" from="0" to="-40" dur="3.2s" repeatCount="indefinite"/>' +
        '</polyline>' +
        '<path id="flowPathRef" d="' + flowPath + '" fill="none" stroke="none"/>' +
        // kuyruklu ana ışık: iki soluk iz + parlak baş (kuyruklu yıldız hissi)
        mkLight(2, 0.28, 1, 0.28) +
        mkLight(3, 0.14, 1, 0.5) +
        mkLight(4.5, 0, 1, 1) +
        // ikinci, daha yavaş yoldaş ışık — haritaya derinlik katar
        mkLight(2.5, dur * 0.45, 1.6, 0.55)
        : '');
    const curLvl = clamp(G.maxLevel, first, last);
    let curY = pts[0].y;
    if (G.maxLevel > last) curY = pts[pts.length - 1].y; // dünya tamamen bitmişse sonunu göster
    for (const p of pts) {
      const done = p.lvl < G.maxLevel, cur = p.lvl === G.maxLevel;
      const distFromCur = Math.abs(p.lvl - curLvl);
      const d = document.createElement('div');
      d.className = 'mapnode ' + (done ? 'done' : cur ? 'cur' : 'lock');
      d.textContent = done ? '✓' : p.lvl;
      d.style.left = p.x + 'px';
      d.style.top = p.y + 'px';
      d.style.animationDelay = Math.min(distFromCur, 22) * 42 + 'ms';
      if (p.lvl <= G.maxLevel) d.addEventListener('click', () => { Sfx.click(); startLevel(p.lvl); });
      el.mapNodes.appendChild(d);
      if (cur) curY = p.y;
    }
    el.mapTitleTxt.textContent = WN(w);
    requestAnimationFrame(() => {
      el.mapScroll.scrollTop = Math.max(0, curY - el.mapScroll.clientHeight * 0.55);
    });
  }
  function showMap(w) {
    G.state = 'menu';
    endTrial();
    if (typeof w === 'number') G.viewWorld = clamp(w, 0, WORLD_COUNT - 1);
    else if (G.mode === 'level' && G.level) G.viewWorld = worldOf(G.level); // oynanan bölümün dünyası
    else G.viewWorld = worldOf(Math.min(G.maxLevel, MAX_LEVEL));
    G.themeWorld = G.viewWorld; applyThemes(); // harita, dünyasının renklerine bürünür
    ['hud', 'joker', 'menu', 'shop', 'tut', 'worlds'].forEach(k => el[k] && el[k].classList.add('hidden'));
    if (el.breath) el.breath.classList.add('hidden');
    hideModal();
    el.mapCoins.textContent = '⬡ ' + G.coins;
    el.map.classList.remove('hidden');
    buildMap();
  }

  /* ---- dünya seçimi: 10 kart, ilerleme + kilit ---- */
  function worldUnlocked(w) { return G.maxLevel >= worldStart(w); }
  function buildWorlds() {
    el.worldList.innerHTML = '';
    for (let w = 0; w < WORLD_COUNT; w++) {
      const first = worldStart(w), last = worldEnd(w);
      const doneCount = clamp(G.maxLevel - first, 0, LEVELS_PER_WORLD);
      const unlocked = worldUnlocked(w);
      const acc = WORLDS[w].accent;
      const bg = WORLD_THEMES[w].bg;

      const card = document.createElement('div');
      card.className = 'worldcard' + (unlocked ? '' : ' locked');
      card.style.setProperty('--acc', acc);
      card.style.background =
        'linear-gradient(135deg, rgba(' + bg.aurora[0].c + ',0.18), transparent 60%),' +
        'linear-gradient(300deg, rgba(' + bg.aurora[1].c + ',0.14), transparent 60%),' +
        'rgb(' + bg.base + ')';

      const num = document.createElement('div');
      num.className = 'wnum'; num.textContent = (w + 1);
      card.appendChild(num);

      const nm = document.createElement('div');
      nm.className = 'wname'; nm.textContent = WN(w);
      card.appendChild(nm);

      const sub = document.createElement('div');
      sub.className = 'wsub';
      sub.textContent = unlocked
        ? T('worldProgress', { a: doneCount, b: LEVELS_PER_WORLD })
        : T('worldLocked');
      card.appendChild(sub);

      if (unlocked) {
        const bar = document.createElement('div');
        bar.className = 'wbar';
        const fill = document.createElement('div');
        fill.className = 'wfill';
        fill.style.width = (doneCount / LEVELS_PER_WORLD * 100) + '%';
        bar.appendChild(fill);
        card.appendChild(bar);
        card.addEventListener('click', () => { Sfx.click(); showMap(w); });
      }
      el.worldList.appendChild(card);
    }
  }
  function showWorlds() {
    G.state = 'menu';
    G.themeWorld = null; applyThemes();
    endTrial();
    ['hud', 'joker', 'menu', 'map', 'shop', 'tut'].forEach(k => el[k] && el[k].classList.add('hidden'));
    if (el.breath) el.breath.classList.add('hidden');
    hideModal();
    el.worldCoins.textContent = '⬡ ' + G.coins;
    el.worlds.classList.remove('hidden');
    buildWorlds();
  }

  /* ---- modal ---- */
  function showModal(title, bodyHTML, buttons) {
    el.modal.innerHTML = '';
    const card = document.createElement('div'); card.className = 'card';
    const h = document.createElement('h2'); h.textContent = title; card.appendChild(h);
    const b = document.createElement('div'); b.className = 'mbody'; b.innerHTML = bodyHTML; card.appendChild(b);
    const btns = document.createElement('div'); btns.className = 'mbtns';
    for (const bt of buttons) {
      const btn = document.createElement('button');
      btn.className = 'mbtn ' + (bt.cls || '');
      btn.innerHTML = bt.label;
      if (bt.disabled) btn.disabled = true;
      btn.addEventListener('click', () => { Sfx.click(); bt.cb && bt.cb(); });
      btns.appendChild(btn);
    }
    card.appendChild(btns);
    el.modal.appendChild(card);
    el.modal.classList.remove('hidden');
  }
  function hideModal() { el.modal.classList.add('hidden'); el.modal.innerHTML = ''; }

  function pauseMenu() {
    if (G.state !== 'playing') return;
    Sfx.click();
    const btns = [
      { label: T('resume'), cls: 'primary', cb: hideModal },
      { label: T('restartBtn'), cb: () => (G.mode === 'zen' ? startZen() : startLevel(G.level)) },
    ];
    if (G.mode === 'level') btns.push({ label: T('mapBtn'), cb: showMap });
    btns.push({ label: T('menuBtn'), cb: showMenu });
    showModal(T('pause'), '<p>' + T('breathe') + '</p>', btns);
  }

  /* ---- seviye sonu (+ altın dökümü + tema denemesi) ---- */
  function levelComplete() {
    const bonus = 20 + G.shots * 5;
    const total = G.levelCoins + bonus;
    G.coins += bonus; saveCoins();
    const done = G.level;
    G.maxLevel = Math.max(G.maxLevel, done + 1);
    if (!TEST_UNLOCK_ALL) store.set('zx_maxlevel', G.maxLevel);
    let extra = '';
    if (done >= 10 && !G.zenUnlocked) {
      G.zenUnlocked = true; store.set('zx_zen', true);
      extra = '<p class="glowline">' + T('zenUnlockedLine') + '</p>';
    }
    Sfx.softNote(440, 0.05, 2.8); Sfx.softNote(660, 0.04, 2.8);
    // ✦ Kilometre taşı: bir dünyanın son bölümü bitti mi? (1000. dahil)
    if (done % LEVELS_PER_WORLD === 0) { worldComplete(done, total, bonus); return; }
    const trial = G.trial;
    const body = '<p>' + T('mindCalm') + '</p><p class="big">+' + total + ' ⬡</p>' +
      '<div class="coinbreak">' +
      '<p>' + T('fromOrbs', { a: G.levelCoins }) + '</p>' +
      '<p>' + T('fromBonus', { b: bonus }) + '</p>' +
      '</div>' + extra +
      (trial ? '<p class="glowline">' + T('trialLine') + ' — ' + TN(trial.id) + '</p>' : '');
    const btns = [];
    if (trial) {
      btns.push({
        label: '◈ ⬡ ' + THEME_COIN, disabled: G.coins < THEME_COIN, cb: () => {
          G.coins -= THEME_COIN; saveCoins();
          ownAndUse(trial.kind, trial.id);
          toast(T('boughtToast', { name: TN(trial.id) }));
          startLevel(done + 1);
        }
      });
      btns.push({ label: T('continueBtn'), cls: 'primary', cb: () => { endTrial(); startLevel(done + 1); } });
    } else {
      btns.push({ label: T('continueBtn'), cls: 'primary', cb: () => startLevel(done + 1) });
    }
    btns.push({ label: T('mapBtn'), cb: showMap });
    btns.push({ label: T('menuBtn'), cb: showMenu });
    showModal(T('lvlTitle', { n: done }), body, btns);
  }

  /* ---- ✦ dünya tamamlandı (kilometre taşı) ---- */
  function worldComplete(done, total, bonus) {
    endTrial();
    const w = worldOf(done);
    const W_ = WORLDS[w];
    G.coins += W_.reward; saveCoins();

    let extra = '';
    // dünyanın teması kalıcı olarak açılır — mağazadan almaya alternatif kazanım yolu
    if (W_.unlockBg) {
      const owned = TEST_UNLOCK_ALL ? Object.keys(SHOP.palettes).concat(Object.keys(SHOP.backgrounds)) : store.get('zx_owned', []);
      if (!owned.includes(W_.unlockBg)) {
        owned.push(W_.unlockBg);
        store.set('zx_owned', owned);
        extra = '<p class="glowline">' + T('milestoneBg', { n: TN(W_.unlockBg) }) + '</p>';
      }
    }
    celebrateLevel();
    Sfx.levelUp();

    // son dünya (1000. bölüm): ödülü ver, ardından yolculuk finalini göster
    if (done >= MAX_LEVEL) {
      showModal(T('doneTitle'),
        '<p>' + T('doneBody') + '</p><p class="big">+' + (total + W_.reward) + ' ⬡</p>' + extra, [
        { label: T('zenGo'), cls: 'primary', cb: startZen },
        { label: T('worldsTitle'), cb: showWorlds },
        { label: T('menuBtn'), cb: showMenu },
      ]);
      return;
    }

    const body = '<p>' + T('milestoneBody', { w: WN(w) }) + '</p>' +
      '<p class="big">+' + (total + W_.reward) + ' ⬡</p>' +
      '<div class="coinbreak">' +
      '<p>' + T('fromOrbs', { a: G.levelCoins }) + '</p>' +
      '<p>' + T('fromBonus', { b: bonus }) + '</p>' +
      '<p style="color:var(--mint)">✦ +' + W_.reward + ' ⬡</p>' +
      '</div>' + extra;

    const btns = [];
    if (done < MAX_LEVEL) {
      btns.push({ label: T('nextWorld'), cls: 'primary', cb: () => startLevel(done + 1) });
    }
    btns.push({ label: T('worldsTitle'), cb: showWorlds });
    btns.push({ label: T('menuBtn'), cb: showMenu });
    showModal(T('milestoneTitle'), body, btns);
  }

  function journeyDone(bonus) {
    endTrial();
    const body = '<p>' + T('doneBody') + '</p>' + (bonus ? '<p class="big">+' + bonus + ' ⬡</p>' : '');
    showModal(T('doneTitle'), body, [
      { label: T('zenGo'), cls: 'primary', cb: startZen },
      { label: T('worldsTitle'), cb: showWorlds },
      { label: T('menuBtn'), cb: showMenu },
    ]);
  }

  /* ---- atışlar bitti ---- */
  function outOfShots() {
    showModal(T('outTitle'),
      '<p>' + T('outBody', { n: G.targetLeft, s: SH(G.targetIdx) }) + '</p>', [
      { label: T('adShots'), cls: 'primary', cb: () => adSim(grantShots) },
      { label: T('buyShots'), disabled: G.coins < 30, cb: () => { G.coins -= 30; saveCoins(); grantShots(); } },
      { label: T('retry'), cb: () => startLevel(G.level) },
      { label: T('menuBtn'), cb: showMenu },
    ]);
  }
  function adSim(cb) {
    let n = 3;
    showModal(T('adTitle'), '<p class="big" id="adCount">3</p><p>' + T('adSim') + '</p>', []);
    const iv = setInterval(() => {
      n--;
      const t = document.getElementById('adCount');
      if (t) t.textContent = n;
      if (n <= 0) { clearInterval(iv); cb(); }
    }, 800);
  }
  function grantShots() {
    G.shots += 3;
    G.resolveLock = false;
    hideModal(); refresh();
    toast(T('shotsGrant'));
  }

  /* ---- zen sonu ---- */
  function zenOver() {
    const nb = Math.max(G.best, G.score);
    const isNew = G.score > G.best;
    G.best = nb; store.set('zx_best', nb);
    saveCoins();
    const btns = [];
    if (!G.zenContinueUsed) {
      btns.push({ label: T('adCont'), cls: 'primary', cb: () => adSim(zenContinue) });
    }
    btns.push({ label: T('reflow'), cls: G.zenContinueUsed ? 'primary' : '', cb: startZen });
    btns.push({ label: T('menuBtn'), cb: showMenu });
    showModal(T('zenOverTitle'),
      '<p class="big">' + G.score + '</p><p>' + (isNew ? T('newRec') : T('bestIs', { n: nb })) + '</p>', btns);
  }
  function zenContinue() {
    G.zenContinueUsed = true;
    let maxR = -Infinity;
    for (const b of G.grid.values()) maxR = Math.max(maxR, b.r);
    const now = performance.now();
    let d = 0;
    for (const [k, b] of [...G.grid.entries()]) {
      if (b.r >= maxR - 1) {
        G.grid.delete(k);
        b.popAt = now + d * 55; b.depth = Math.min(d, 6); b.popStarted = 0;
        G.pops.push(b); G.pendingPops++; d++;
      }
    }
    G.resolveLock = false;
    hideModal(); refresh();
    toast(T('flowOn'));
  }

  /* ---- mağaza ---- */
  function ownAndUse(kind, id) {
    const owned = TEST_UNLOCK_ALL ? Object.keys(SHOP.palettes).concat(Object.keys(SHOP.backgrounds)) : store.get('zx_owned', []);
    if (!owned.includes(id)) { owned.push(id); store.set('zx_owned', owned); }
    if (kind === 'pal') { G.activePal = id; store.set('zx_pal', id); }
    else { G.activeBg = id; store.set('zx_bg', id); }
    G.trial = null;
    applyThemes();
  }
  function endTrial() { if (G.trial) { G.trial = null; applyThemes(); } }
  function tryTheme(kind, id) {
    G.trial = { kind, id };
    applyThemes();
    toast(T('trialToast'));
    startLevel(Math.min(G.maxLevel, MAX_LEVEL));
  }
  function buyMoney(name, price, onOk, onCancel) {
    showModal(T('buyTitle'), '<p>' + T('buyBody', { name: name, p: price }) + '</p>', [
      { label: T('confirm'), cls: 'primary', cb: () => { Sfx.softNote(523, 0.045, 2.2); onOk(); } },
      { label: T('cancel'), cb: onCancel || showShop },
    ]);
  }
  function buyCoinsCosmetic(kind, id) {
    if (G.coins < THEME_COIN) { toast(T('needGold', { n: THEME_COIN })); return; }
    showModal(T('buyTitle'), '<p>' + T('coinBody', { name: TN(id), n: THEME_COIN }) + '</p>', [
      { label: T('confirm'), cls: 'primary', cb: () => {
          G.coins -= THEME_COIN; saveCoins();
          ownAndUse(kind, id);
          toast(T('boughtToast', { name: TN(id) }));
          showShop();
        } },
      { label: T('cancel'), cb: showShop },
    ]);
  }
  function adForCoins() {
    adSim(() => {
      hideModal();
      G.coins += AD_COINS; saveCoins();
      toast(T('gotCoins', { n: AD_COINS }));
      showShop();
    });
  }
  function mkBtn(label, cb, cls) {
    const b = document.createElement('button');
    b.className = 'shopbtn ' + (cls || '');
    b.textContent = label;
    b.addEventListener('click', () => { Sfx.click(); cb(); });
    return b;
  }
  function drawPalPreview(cv, colors) {
    const d = window.devicePixelRatio || 1;
    cv.width = 150 * d; cv.height = 30 * d;
    const c2 = cv.getContext('2d');
    c2.setTransform(d, 0, 0, d, 0, 0);
    PALETTE.forEach((p, i) => drawShapeCore(c2, p.shape, 14 + i * 24.5, 15, 8.5, colors[i], 1, 4));
  }
  function bgPreviewCss(bg) {
    const a = bg.aurora;
    return 'linear-gradient(180deg, rgba(' + (bg.wash || '150,180,255') + ',0.28), transparent 55%),' +
      'radial-gradient(circle at 25% 40%, rgba(' + a[0].c + ',0.5), transparent 62%),' +
      'radial-gradient(circle at 72% 55%, rgba(' + a[1].c + ',0.42), transparent 62%),' +
      'radial-gradient(circle at 50% 88%, rgba(' + a[2].c + ',0.38), transparent 62%), rgb(' + (bg.base || '5,5,8') + ')';
  }
  function buildShop() {
    el.shopList.innerHTML = '';
    const owned = TEST_UNLOCK_ALL ? Object.keys(SHOP.palettes).concat(Object.keys(SHOP.backgrounds)) : store.get('zx_owned', []);
    const sec = txt => { const h = document.createElement('div'); h.className = 'shopsec'; h.textContent = txt; el.shopList.appendChild(h); };

    // ücretsiz altın — reklam hunisi
    sec(T('freeGold'));
    const adCard = document.createElement('div'); adCard.className = 'shopcard adcard';
    const adBtn = mkBtn('', adForCoins, 'primarybtn wide');
    adBtn.innerHTML = T('adCoins', { n: AD_COINS });
    adCard.appendChild(adBtn);
    el.shopList.appendChild(adCard);

    // altın paketleri
    sec(T('packs'));
    const row = document.createElement('div'); row.className = 'packrow';
    for (const pk of SHOP.coinPacks) {
      const c = document.createElement('div'); c.className = 'packcard';
      c.innerHTML = '<div class="packcoins">⬡ ' + pk.coins + '</div>';
      const price = pk.price[LANG] || pk.price.tr;
      c.appendChild(mkBtn(price, () => buyMoney('⬡ ' + pk.coins, price, () => {
        G.coins += pk.coins; saveCoins();
        toast(T('gotCoins', { n: pk.coins }));
        showShop();
      }), 'buy'));
      row.appendChild(c);
    }
    el.shopList.appendChild(row);

    // kozmetikler: dene → altınla veya ₺ ile al
    const secs = [['palettes', SHOP.palettes, 'pal'], ['backgrounds', SHOP.backgrounds, 'bg']];
    for (const [secKey, items, kind] of secs) {
      sec(T(secKey));
      for (const id in items) {
        const it = items[id];
        const isOwned = it.free || owned.includes(id);
        const isActive = (kind === 'pal' ? G.activePal : G.activeBg) === id;
        const card = document.createElement('div'); card.className = 'shopcard';
        if (kind === 'pal') {
          const cv = document.createElement('canvas'); cv.className = 'palprev';
          drawPalPreview(cv, it.colors || BASE_COLORS);
          card.appendChild(cv);
        } else {
          const sw = document.createElement('div'); sw.className = 'bgprev';
          sw.style.background = bgPreviewCss(it);
          card.appendChild(sw);
        }
        const r2 = document.createElement('div'); r2.className = 'shoprow';
        const nm = document.createElement('div'); nm.className = 'shopname'; nm.textContent = TN(id);
        r2.appendChild(nm);
        const bt = document.createElement('div'); bt.className = 'shopbtns';
        if (isActive) {
          const t = document.createElement('span'); t.className = 'shoptag'; t.textContent = T('activeTag');
          bt.appendChild(t);
        } else if (isOwned) {
          bt.appendChild(mkBtn(T('useBtn'), () => {
            if (kind === 'pal') { G.activePal = id; store.set('zx_pal', id); }
            else { G.activeBg = id; store.set('zx_bg', id); }
            applyThemes(); buildShop();
          }));
        } else {
          bt.appendChild(mkBtn(T('tryBtn'), () => tryTheme(kind, id)));
          bt.appendChild(mkBtn('⬡ ' + THEME_COIN, () => buyCoinsCosmetic(kind, id), 'gold' + (G.coins < THEME_COIN ? ' off' : '')));
        }
        r2.appendChild(bt);
        card.appendChild(r2);
        el.shopList.appendChild(card);
      }
    }
  }
  function showShop() {
    G.state = 'menu';
    G.themeWorld = null; applyThemes();
    endTrial();
    ['hud', 'joker', 'menu', 'map', 'tut', 'worlds'].forEach(k => el[k] && el[k].classList.add('hidden'));
    if (el.breath) el.breath.classList.add('hidden');
    hideModal();
    el.shopCoins.textContent = '⬡ ' + G.coins;
    el.shop.classList.remove('hidden');
    buildShop();
  }

  /* ✦ sürpriz: zen akışı içinde sessizce beliren nefes rehberi — oyunu durdurmaz */
  function breathGuide() {
    if (!el.breath) return;
    el.breath.classList.remove('hidden', 'go');
    void el.breath.offsetWidth;
    el.breath.classList.add('go');
    setTimeout(() => el.breath.classList.add('hidden'), 17000);
  }

  /* ---- yüzen yazı & toast ---- */
  function floatText(pos, txt, big) {
    const d = document.createElement('div');
    d.className = 'floatxt' + (big ? ' bigpraise' : '');
    d.textContent = txt;
    d.style.left = pos.x * SC + 'px';
    d.style.top = pos.y * SC + 'px';
    el.fx.appendChild(d);
    setTimeout(() => d.remove(), big ? 1900 : 1400);
  }
  function toast(txt) {
    const d = document.createElement('div');
    d.className = 'toast';
    d.textContent = txt;
    el.fx.appendChild(d);
    setTimeout(() => d.classList.add('show'), 10);
    setTimeout(() => { d.classList.remove('show'); setTimeout(() => d.remove(), 400); }, 2300);
  }

  return { init, boot, refresh, refreshScore, enterGame, showMenu, showWorlds, showMap, levelComplete, outOfShots, zenOver, floatText, toast, journeyDone, targetIntro, showTutorial, breathGuide };
})();

/* ---------- Başlat ---------- */
window.addEventListener('load', () => {
  canvas = document.getElementById('game');
  ctx = canvas.getContext('2d');
  resize();
  window.addEventListener('resize', resize);
  bindInput();
  UI.init();
  applyThemes();
  UI.boot();
  requestAnimationFrame(t => { lastT = t; requestAnimationFrame(loop); });
});

</script>
</body>
</html>
